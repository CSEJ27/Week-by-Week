<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week by Week Material</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-dark: #0a0012; --card-bg: rgba(39, 18, 68, 0.6); --accent-pink: #e91e8c; --accent-purple: #b519d6; --accent-blue: #4a90e2; --text-main: #ffffff; --text-sub: #c4b5db; }
        body { font-family: 'Work Sans', sans-serif; background: linear-gradient(135deg, var(--bg-dark), #1a0d2e, #240b3b); background-attachment: fixed; color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 50% 50%, rgba(233, 30, 140, 0.1) 0%, transparent 60%); z-index: -1; pointer-events: none; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; text-align: center; margin-bottom: 10px; background: linear-gradient(to right, var(--accent-pink), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(233, 30, 140, 0.3); }
        .subtitle { text-align: center; color: var(--text-sub); margin-bottom: 50px; font-size: 1.2rem; }
        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        .back-btn { background: rgba(0,0,0,0.3); border: 2px solid var(--accent-pink); color: white; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px; transition: 0.3s; box-shadow: 0 0 15px rgba(233, 30, 140, 0.1); }
        .back-btn:hover { background: var(--accent-pink); box-shadow: 0 0 25px rgba(233, 30, 140, 0.4); }
        .header-actions { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        
        /* Header Buttons */
        .recent-btn { background: rgba(74, 144, 226, 0.2); border: 2px solid var(--accent-blue); color: var(--accent-blue); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .recent-btn:hover { background: var(--accent-blue); color: white; box-shadow: 0 0 20px var(--accent-blue); }
        .schedule-btn { background: rgba(255, 149, 0, 0.2); border: 2px solid #ff9500; color: #ff9500; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .schedule-btn:hover { background: #ff9500; color: black; box-shadow: 0 0 20px #ff9500; }
        .help-btn { background: rgba(0, 200, 83, 0.2); border: 2px solid #00c853; color: #00c853; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; text-decoration: none; display: inline-block;}
        .help-btn:hover { background: #00c853; color: white; box-shadow: 0 0 20px #00c853; }
        
        .drive-btn { background: rgba(255, 215, 0, 0.1); border: 2px solid #ffd700; color: #ffd700; padding: 8px 20px; border-radius: 20px; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 10px; transition: 0.3s; font-size: 0.9rem; }
        .drive-btn:hover { background: #ffd700; color: black; box-shadow: 0 0 15px #ffd700; }
        .grid { display: grid; gap: 30px; }
        .subjects-grid { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
        .weeks-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
        .resources-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        .recent-grid { grid-template-columns: 1fr; max-width: 800px; margin: 0 auto; }
        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 2px solid rgba(233, 30, 140, 0.2); border-radius: 20px; padding: 30px; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-8px); border-color: var(--accent-pink); box-shadow: 0 15px 40px rgba(233, 30, 140, 0.25); }
        .card.locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; border-color: #555; }
        .card.locked:hover { transform: none; box-shadow: none; }
        
        .info-box { background: rgba(20, 10, 30, 0.8); border: 2px solid var(--accent-pink); border-radius: 20px; padding: 35px; margin-bottom: 40px; box-shadow: 0 0 50px rgba(233, 30, 140, 0.15); }
        .info-title { font-family: 'Orbitron'; font-size: 2.2rem; color: var(--accent-pink); margin-bottom: 25px; }
        .detail-row { display: flex; gap: 20px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .detail-row:last-child { border-bottom: none; }
        .detail-icon { width: 50px; height: 50px; background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .detail-content h3 { font-family: 'Orbitron'; margin-bottom: 5px; color: white; }
        .detail-content p { color: var(--text-sub); line-height: 1.5; white-space: pre-wrap; }
        .badge-new { background: var(--accent-pink); color: white; font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; margin-left: 10px; font-weight: 900; letter-spacing: 1px; box-shadow: 0 0 10px var(--accent-pink); vertical-align: middle; animation: pulse 1.5s infinite alternate; display: inline-block; }
        @keyframes pulse { from { opacity: 1; transform: scale(1); } to { opacity: 0.8; transform: scale(1.05); } }
        .custom-badge { position: absolute; top: 0; right: 0; background: #333; color: white; font-size: 0.8rem; padding: 5px 15px; border-bottom-left-radius: 15px; font-weight: bold; box-shadow: -2px 2px 10px rgba(0,0,0,0.5); max-width: 80%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .recent-card { background: rgba(74, 144, 226, 0.1); border: 1px solid var(--accent-blue); padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; cursor: pointer; transition: 0.3s; }
        .recent-card:hover { transform: translateX(10px); background: rgba(74, 144, 226, 0.2); }
        .recent-header { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--accent-blue); display:flex; justify-content:space-between; align-items:center; }
        .recent-sub { color: #ccc; font-size: 0.95rem; line-height: 1.5; }
        .recent-icons { font-size: 1.5rem; letter-spacing: 5px; margin-top: 5px; }
        .recent-time { font-size: 0.8rem; color: var(--accent-pink); font-weight: bold; white-space: nowrap; margin-left: 10px; }
        
        .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #ccc; padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .filter-btn:hover { background: rgba(255,255,255,0.15); color: white; }
        .filter-btn.active { background: var(--accent-pink); color: white; border-color: var(--accent-pink); box-shadow: 0 0 15px rgba(233,30,140,0.4); font-weight: bold; }
        
        /* Schedule/Submissions Styles */
        .total-badge { background: rgba(20, 10, 30, 0.8); border: 1px solid var(--accent-blue); color: var(--accent-blue); padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; box-shadow: 0 0 10px rgba(74, 144, 226, 0.2); }
        .total-badge.high-load { border-color: #ff3b30; color: #ff3b30; box-shadow: 0 0 15px rgba(255, 59, 48, 0.3); animation: pulse 2s infinite alternate; }
        .task-list { display: flex; flex-direction: column; gap: 12px; flex-grow: 1; margin-top: 15px; }
        .task-item { background: rgba(0, 0, 0, 0.2); padding: 12px 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; font-size: 0.95rem; border-left: 4px solid #555; transition: 0.2s; cursor: pointer; }
        .task-item:hover { background: rgba(0, 0, 0, 0.4); transform: translateX(5px); box-shadow: 0 0 15px rgba(255,255,255,0.05); }
        .empty-state { color: #666; font-style: italic; text-align: center; padding: 20px 0; font-size: 1rem; }
        
        .sub-badge { font-weight: bold; font-size: 0.8rem; padding: 3px 8px; border-radius: 6px; color: #fff; min-width: 45px; text-align: center; }
        .task-icon { font-size: 1.2rem; }
        .task-name { color: var(--text-main); font-weight: 500; }

        /* Task Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
        .modal-content { background: #1a0d2e; border: 2px solid var(--accent-pink); border-radius: 20px; padding: 30px; width: 90%; max-width: 450px; position: relative; box-shadow: 0 10px 40px rgba(233, 30, 140, 0.3); }
        .modal-close { position: absolute; top: 15px; right: 20px; color: #ccc; cursor: pointer; font-size: 1.8rem; font-weight: bold; transition: 0.2s; }
        .modal-close:hover { color: white; transform: scale(1.1); }
        .modal-title { font-family: 'Orbitron'; color: white; font-size: 1.8rem; margin-bottom: 5px; display:flex; align-items:center; gap:10px; }
        .modal-subtitle { color: var(--accent-pink); font-weight: bold; margin-bottom: 25px; font-size: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .modal-field { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .modal-label { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .modal-value { color: white; font-size: 1.1rem; background: rgba(0,0,0,0.3); padding: 10px 15px; border-radius: 8px; border-left: 3px solid var(--accent-blue); line-height: 1.4; white-space: pre-wrap; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script src="course_data.js"></script>
</head>
<body>

<div class="container">
    <div id="home-page" class="page active">
        <header>
            <h1>WEEK BY WEEK MATERIAL</h1>
            <p class="subtitle">Select a subject to begin</p>
        </header>
        <div class="header-actions">
            <button class="recent-btn" onclick="showRecent()">📜 History</button>
            <button class="schedule-btn" onclick="showSchedule()">📅 Schedule</button>
            <a id="help-btn" href="#" target="_blank" class="help-btn">🤝 Help Us</a>
        </div>
        <div class="grid subjects-grid" id="subjects-grid"></div>
    </div>

    <div id="recent-page" class="page">
        <button class="back-btn" onclick="nav('home')">← Back to Subjects</button>
        <h1 style="color:var(--accent-blue)">HISTORY</h1>
        <div class="grid recent-grid" id="recent-list"></div>
    </div>

    <div id="schedule-page" class="page">
        <button class="back-btn" onclick="nav('home')">← Back to Subjects</button>
        <h1 style="color:#ff9500">SEMESTER MAP</h1>
        <p class="subtitle" style="margin-bottom: 30px;">Your overview of assignments, quizzes, and projects</p>
        <div class="grid weeks-grid" id="deliverables-grid"></div>
    </div>

    <div id="weeks-page" class="page">
        <button class="back-btn" onclick="nav('home')">← Back to Subjects</button>
        <div style="text-align:center;">
            <h1 id="subject-title" style="margin-bottom:5px;"></h1>
            <div id="drive-container" style="margin-bottom:20px;"></div>
        </div>
        <div id="filter-bar" class="filter-bar"></div>
        <div class="grid weeks-grid" id="weeks-grid"></div>
    </div>

    <div id="content-page" class="page">
        <button class="back-btn" onclick="nav('weeks')">← Back to Weeks</button>
        <div class="info-box">
            <div class="info-title" id="week-display-title"></div>
            <div id="week-details"></div>
        </div>
        <h2 style="font-family:'Orbitron'; color:white; margin-bottom:20px; border-bottom: 2px solid var(--accent-blue); display:inline-block; padding-bottom:5px">RESOURCES</h2>
        <div class="grid resources-grid" id="resources-grid"></div>
    </div>
</div>

<div id="task-modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-close" onclick="closeModal(null, true)">✕</div>
        <div class="modal-title" id="m-title">🧠 Quiz</div>
        <div class="modal-subtitle" id="m-sub">Computer Networks - Week 5</div>
        <div id="m-fields-container">
            </div>
    </div>
</div>

<script>
    let iconMap = {};
    if(window.CONFIG && window.CONFIG.resources) {
        window.CONFIG.resources.forEach(r => iconMap[r.name] = r.icon);
    }
    if(window.CONFIG && window.CONFIG.helpLink) {
        document.getElementById('help-btn').href = window.CONFIG.helpLink;
    }

    // Backup hardcoded data just in case course_data.js hasn't been updated yet
    if(typeof window.SCHEDULE_DATA === 'undefined') {
        window.SCHEDULE_DATA = [
            { week: 1, tasks: [] }, { week: 2, tasks: [] }, { week: 3, tasks: [] }, { week: 4, tasks: [] },
            { week: 5, tasks: [ { sub: 'DSA', name: 'Quiz', icon: '🧠' }, { sub: 'DB', name: 'Quiz', icon: '🧠' }, { sub: 'OS', name: 'Quiz', icon: '🧠' } ] },
            { week: 6, tasks: [ { sub: 'CA', name: 'Quiz', icon: '🧠' }, { sub: 'AI', name: 'Quiz', icon: '🧠' } ] },
            { week: 7, tasks: [ { sub: 'CA', name: 'Assignment', icon: '📝' }, { sub: 'DB', name: 'Mini Project', icon: '🚀' }, { sub: 'CN', name: 'Quiz', icon: '🧠' } ] },
            { week: 8, tasks: [] }, 
            { week: 9, tasks: [ { sub: 'DSA', name: 'Quiz', icon: '🧠' }, { sub: 'DB', name: 'Quiz', icon: '🧠' } ] },
            { week: 10, tasks: [ { sub: 'OS', name: 'Mini Project', icon: '🚀' }, { sub: 'CN', name: 'Assignment', icon: '📝' } ] },
            { week: 11, tasks: [ { sub: 'CA', name: 'Assignment', icon: '📝' }, { sub: 'OS', name: 'Report Presentation', icon: '📊' } ] },
            { week: 12, tasks: [ { sub: 'DSA', name: 'Quiz', icon: '🧠' }, { sub: 'OS', name: 'Quiz', icon: '🧠' } ] },
            { week: 13, tasks: [ { sub: 'DSA', name: 'Mini Project', icon: '🚀' }, { sub: 'DB', name: 'Mini Project', icon: '🚀' }, { sub: 'OS', name: 'Assignment', icon: '📝' }, { sub: 'AI', name: 'Quiz', icon: '🧠' } ] },
            { week: 14, tasks: [ { sub: 'CA', name: 'Quiz', icon: '🧠' }, { sub: 'DB', name: 'Mini Project', icon: '🚀' }, { sub: 'CN', name: 'Quiz', icon: '🧠' }, { sub: 'AI', name: 'Mini Project', icon: '🚀' } ] },
            { week: 15, tasks: [ { sub: 'CA', name: 'Assignment', icon: '📝' }, { sub: 'CN', name: 'Mini Project', icon: '🚀' } ] }
        ];
    }
    
    let currSub = null;

    function init() {
        const grid = document.getElementById('subjects-grid');
        grid.innerHTML = '';
        if(!window.COURSE_DATA) window.COURSE_DATA = [];

        window.COURSE_DATA.forEach(s => {
            const el = document.createElement('div');
            el.className = 'card';
            el.innerHTML = `
                <div style="font-family:'Orbitron'; font-size:2.5rem; color:var(--accent-pink); margin-bottom:10px">${s.code}</div>
                <div style="color:#eee; font-size:1.1rem; margin-bottom:20px">${s.name}</div>
                <div style="display:flex; justify-content:space-between; color:#bbb; font-size:0.9rem; border-top:1px solid rgba(233,30,140,0.3); padding-top:15px">
                    <span>${s.credits}</span><span>${s.semester}</span>
                </div>`;
            el.onclick = () => showWeeks(s);
            grid.appendChild(el);
        });
        
        window.onpopstate = function(event) {
            closeModal(null, true); // ensure modal closes on back
            if(event.state) {
                if(event.state.page === 'weeks' || event.state.page === 'content') {
                    if(!currSub && event.state.subCode) {
                        currSub = window.COURSE_DATA.find(s => s.code === event.state.subCode);
                    }
                    if(!currSub) { nav('home', false); return; } 
                }
                
                if(event.state.page === 'home') nav('home', false);
                else if(event.state.page === 'recent') nav('recent', false);
                else if(event.state.page === 'schedule') showSchedule(false);
                else if(event.state.page === 'weeks') showWeeks(currSub, false);
                else if(event.state.page === 'content') showContentByObj(event.state.wkObj, false);
            } else {
                nav('home', false);
            }
        };
        history.replaceState({page: 'home'}, null, "");
    }

    function parseDate(str) {
        if(!str) return 0;
        try {
            const parts = str.trim().split(/\s+/);
            if(parts.length < 2) return 0;
            const dParts = parts[0].split('/');
            const tParts = parts[1].split(':');
            const ampm = parts[2] ? parts[2].toUpperCase() : '';
            let h = parseInt(tParts[0], 10);
            const m = parseInt(tParts[1], 10);
            if(ampm === 'PM' && h < 12) h += 12;
            if(ampm === 'AM' && h === 12) h = 0;
            
            const yr = parseInt(dParts[2], 10);
            const mo = parseInt(dParts[1], 10) - 1;
            const da = parseInt(dParts[0], 10);
            
            const timestamp = new Date(yr, mo, da, h, m).getTime();
            return isNaN(timestamp) ? 0 : timestamp;
        } catch(e) { return 0; }
    }

    function showRecent() {
        const list = document.getElementById('recent-list');
        list.innerHTML = '';
        let items = [];

        window.COURSE_DATA.forEach(sub => {
            if(!sub.weeks) return;
            sub.weeks.forEach(wk => {
                if(wk.isRecent) {
                    items.push({
                        type: 'week',
                        subName: sub.name,
                        subCode: sub.code,
                        wkObj: wk,
                        dateStr: wk.recentDate || "",
                        timestamp: parseDate(wk.recentDate)
                    });
                }
                if(wk.resources) {
                    Object.keys(wk.resources).forEach(k => {
                        const res = wk.resources[k];
                        if(res.isRecent && res.vis) {
                            items.push({
                                type: 'res',
                                subName: sub.name,
                                subCode: sub.code,
                                wkObj: wk,
                                resName: k,
                                dateStr: res.recentDate || "",
                                timestamp: parseDate(res.recentDate)
                            });
                        }
                    });
                }
            });
        });

        items.sort((a, b) => b.timestamp - a.timestamp);

        if(items.length === 0) {
            list.innerHTML = `<div style="text-align:center; color:#666; margin-top:50px">No history found.</div>`;
        } else {
            items.forEach(item => {
                const el = document.createElement('div');
                el.className = 'recent-card';
                el.onclick = () => { currSub = window.COURSE_DATA.find(s => s.code === item.subCode); showContentByObj(item.wkObj); };

                if(item.type === 'week') {
                    let resList = "";
                    if(item.wkObj.resources) {
                        const keys = window.CONFIG && window.CONFIG.resources ? window.CONFIG.resources.map(r=>r.name) : Object.keys(item.wkObj.resources);
                        keys.forEach(k => {
                            if(item.wkObj.resources[k] && item.wkObj.resources[k].vis && !item.wkObj.resources[k].isRecent) {
                                resList += `<div style="margin-top:4px;">${iconMap[k]||'📂'} ${k}</div>`;
                            }
                        });
                    }
                    el.innerHTML = `
                        <div class="recent-header">
                            <span>${item.subName} - ${item.wkObj.title}</span>
                            <span class="recent-time">${item.dateStr}</span>
                        </div>
                        <div style="margin-top:5px; color:#888; font-size:0.8rem; text-transform:uppercase; letter-spacing:1px;">Full Update Includes:</div>
                        <div class="recent-sub">${resList}</div>
                    `;
                } else {
                    el.innerHTML = `
                        <div class="recent-header">
                            <span>${item.subName} - ${item.wkObj.title}</span>
                            <span class="recent-time">${item.dateStr}</span>
                        </div>
                        <div class="recent-sub" style="margin-top:10px;">
                            New Upload: <strong style="color:white">${item.resName}</strong>
                        </div>
                        <div class="recent-icons">${iconMap[item.resName] || "📂"}</div>
                    `;
                }
                list.appendChild(el);
            });
        }
        nav('recent');
    }

    // --- SCHEDULE LOGIC ---
    function getSubjectColor(code) { 
        if(window.COURSE_DATA) {
            const s = window.COURSE_DATA.find(x => x.code === code);
            if(s && s.color) return s.color;
        }
        const fallback = { 'CA': '#ff9500', 'DSA': '#34c759', 'DB': '#007aff', 'OS': '#ff2d55', 'CN': '#af52de', 'AI': '#ffcc00' };
        return fallback[code] || '#e91e8c'; 
    }
    
    function getSubjectBg(code) { 
        const hex = getSubjectColor(code);
        let c; 
        if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){ 
            c = hex.substring(1).split(''); 
            if(c.length === 3) c = [c[0], c[0], c[1], c[1], c[2], c[2]]; 
            c = '0x'+c.join(''); 
            return 'rgba('+[(c>>16)&255, (c>>8)&255, c&255].join(',')+',0.2)'; 
        } 
        return 'rgba(233,30,140,0.2)';
    }

    function showSchedule(push = true) {
        const grid = document.getElementById('deliverables-grid');
        grid.innerHTML = '';
        
        window.SCHEDULE_DATA.forEach((data, wIndex) => {
            const card = document.createElement('div');
            const isEmpty = !data.tasks || data.tasks.length === 0;
            const isHighLoad = !isEmpty && data.tasks.length >= 4;
            
            card.className = `card ${isEmpty ? 'locked' : ''}`;
            
            let tasksHtml = '';
            if (isEmpty) {
                tasksHtml = `<div class="empty-state">No deliverables scheduled</div>`;
            } else {
                data.tasks.forEach((task, tIndex) => {
                    tasksHtml += `
                        <div class="task-item" style="border-left-color: ${getSubjectColor(task.sub)}" onclick="openModal(${wIndex}, ${tIndex})">
                            <span class="sub-badge" style="background: ${getSubjectBg(task.sub)}; color: ${getSubjectColor(task.sub)}">${task.sub}</span>
                            <span class="task-icon">${task.icon}</span>
                            <span class="task-name">${task.name}</span>
                        </div>
                    `;
                });
            }

            let badgeHtml = '';
            if (!isEmpty) {
                const badgeClass = isHighLoad ? 'total-badge high-load' : 'total-badge';
                const plural = data.tasks.length > 1 ? 'Tasks' : 'Task';
                badgeHtml = `<div class="${badgeClass}">${data.tasks.length} ${plural}</div>`;
            } else {
                badgeHtml = `<div class="total-badge" style="border-color:#555; color:#888;">0 Tasks</div>`;
            }

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">
                    <h2 style="font-family:'Orbitron'; color:var(--accent-purple); font-size:1.5rem; margin:0;">WEEK ${data.week}</h2>
                    ${badgeHtml}
                </div>
                <div class="task-list">
                    ${tasksHtml}
                </div>
            `;
            grid.appendChild(card);
        });
        nav('schedule', push);
    }

    function openModal(wIndex, tIndex) {
        const weekData = window.SCHEDULE_DATA[wIndex];
        const task = weekData.tasks[tIndex];
        
        let subName = task.sub;
        if(window.COURSE_DATA) {
            const sObj = window.COURSE_DATA.find(s => s.code === task.sub);
            if(sObj) subName = sObj.name;
        }

        document.getElementById('m-title').innerHTML = `${task.icon} ${task.name}`;
        document.getElementById('m-sub').innerText = `${subName} - Week ${weekData.week}`;
        
        const container = document.getElementById('m-fields-container');
        container.innerHTML = '';
        
        let hasContent = false;

        const fields = [
            { label: '🕒 When', val: task.when },
            { label: '📍 Where', val: task.where },
            { label: '📚 Coverage', val: task.coverage },
            { label: '📝 Extra Notes', val: task.note }
        ];

        fields.forEach(f => {
            if(f.val && f.val.trim() !== '') {
                hasContent = true;
                container.innerHTML += `
                    <div class="modal-field">
                        <div class="modal-label">${f.label}</div>
                        <div class="modal-value">${f.val}</div>
                    </div>
                `;
            }
        });

        if(!hasContent) {
            container.innerHTML = `<div style="text-align:center; color:#666; font-style:italic; padding:20px 0;">No extra details provided.</div>`;
        }

        document.getElementById('task-modal').classList.add('active');
    }

    function closeModal(e, force = false) {
        if(force || e.target.id === 'task-modal') {
            document.getElementById('task-modal').classList.remove('active');
        }
    }
    // --- END SCHEDULE LOGIC ---

    function showWeeks(sub, push = true) {
        currSub = sub;
        document.getElementById('subject-title').innerText = `${sub.code} - ${sub.name}`;
        
        const dContainer = document.getElementById('drive-container');
        dContainer.innerHTML = '';
        if(sub.driveLink && sub.driveLink.trim() !== "") {
            const a = document.createElement('a');
            a.className = 'drive-btn';
            a.href = sub.driveLink;
            a.target = "_blank";
            a.innerHTML = "📂 Course Drive";
            dContainer.appendChild(a);
        }

        renderFilterBar();
        renderWeekGrid('ALL');
        nav('weeks', push, { subCode: sub.code });
    }

    function renderFilterBar() {
        const bar = document.getElementById('filter-bar');
        bar.innerHTML = '';
        
        const availableTypes = new Set();
        if(currSub.weeks) {
            currSub.weeks.forEach(w => {
                if(w.resources) {
                    Object.keys(w.resources).forEach(key => {
                        if(w.resources[key].vis) {
                            availableTypes.add(key);
                        }
                    });
                }
            });
        }

        const btnAll = document.createElement('button');
        btnAll.className = 'filter-btn active';
        btnAll.innerText = 'ALL';
        btnAll.onclick = () => { setActiveFilter(btnAll); renderWeekGrid('ALL'); };
        bar.appendChild(btnAll);

        if(window.CONFIG && window.CONFIG.resources) {
            window.CONFIG.resources.forEach(res => {
                if(availableTypes.has(res.name)) {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.innerText = res.name;
                    btn.onclick = () => { setActiveFilter(btn); renderWeekGrid(res.name); };
                    bar.appendChild(btn);
                }
            });
        }
    }

    function setActiveFilter(btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function renderWeekGrid(filterType) {
        const grid = document.getElementById('weeks-grid');
        grid.innerHTML = '';
        if(!currSub.weeks) currSub.weeks = [];

        if(filterType === 'ALL') {
            currSub.weeks.forEach((w, i) => {
                const el = document.createElement('div');
                el.className = 'card' + (w.locked ? ' locked' : '');
                const lockIcon = w.locked ? '<div style="font-size:2rem; margin-bottom:10px">🔒</div>' : '';
                const status = w.locked ? 'UNAVAILABLE' : 'CLICK TO VIEW';
                const badge = w.isNew ? '<span class="badge-new">NEW!</span>' : '';
                let customBadge = '';
                if(w.showBadge && w.badgeText) {
                    customBadge = `<div class="custom-badge" style="background:${w.badgeColor || '#e91e8c'}">${w.badgeText}</div>`;
                }
                el.innerHTML = `${customBadge}${lockIcon}<div style="font-family:'Orbitron'; font-size:1.5rem; color:var(--accent-purple); margin-bottom:5px; padding-top:10px;">${w.title}${badge}</div><div style="color:#888; font-size:0.8rem">${status}</div>`;
                if(!w.locked) el.onclick = () => showContent(i);
                grid.appendChild(el);
            });
        } else {
            let found = false;
            currSub.weeks.forEach((w, i) => {
                if(w.resources && w.resources[filterType]) {
                    const res = w.resources[filterType];
                    if(res.vis) {
                        found = true;
                        const el = document.createElement('div');
                        const isLocked = w.locked || res.lock;
                        el.className = 'card' + (isLocked ? ' locked' : '');
                        const badgeText = (w.showBadge && w.badgeText) ? ` • <span style="color:${w.badgeColor}">${w.badgeText}</span>` : '';
                        
                        const resBadgeCard = res.isNew ? '<div style="margin-top:5px;"><span class="badge-new" style="margin-left:0;">NEW!</span></div>' : '';
                        const notesHtml = (res.desc && res.desc.trim()) ? `<div style="margin-top:15px; padding-top:15px; border-top:1px solid rgba(255,255,255,0.1); color:var(--text-sub); font-size:0.9rem; line-height:1.4; white-space:pre-wrap;">${res.desc}</div>` : '';
                        
                        el.innerHTML = `
                            <div style="font-size:2.5rem; margin-bottom:10px">${iconMap[filterType] || '📂'}</div>
                            <div style="font-weight:bold; text-transform:uppercase;">${filterType}</div>
                            ${resBadgeCard}
                            <div style="color:#aaa; font-size:0.9rem; margin-top:5px;">${w.title}${badgeText}</div>
                            ${notesHtml}
                        `;
                        el.onclick = () => {
                            if(isLocked) return alert("Locked");
                            if(res.link && res.link !== "#") window.open(res.link, "_blank");
                            else alert("No link set.");
                        };
                        grid.appendChild(el);
                    }
                }
            });
            if(!found) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color:#666; margin-top:30px;">No ${filterType} found in this subject.</div>`;
            }
        }
    }

    function showContent(i) { showContentByObj(currSub.weeks[i]); }

    function showContentByObj(week, push = true) {
        const badgeTitle = week.isNew ? '<span class="badge-new">NEW!</span>' : '';
        document.getElementById('week-display-title').innerHTML = `${currSub.code} - ${week.title} ${badgeTitle}`;
        const details = document.getElementById('week-details');
        const grid = document.getElementById('resources-grid');
        details.innerHTML = ''; grid.innerHTML = '';

        if(!week.resources) week.resources = {};

        // 1. Load Resource Notes
        if(window.CONFIG && window.CONFIG.resources) {
            window.CONFIG.resources.forEach(conf => {
                const key = conf.name;
                const val = week.resources[key];
                const icon = iconMap[key] || '📂';
                if(val && val.vis) {
                    
                    const resBadgeInline = val.isNew ? '<span class="badge-new">NEW!</span>' : '';
                    if(val.desc && val.desc.trim()) {
                        const row = document.createElement('div');
                        row.className = 'detail-row';
                        row.innerHTML = `<div class=\"detail-icon\">${icon}</div><div class=\"detail-content\"><h3>${key} ${resBadgeInline}</h3><p>${val.desc}</p></div>`;
                        details.appendChild(row);
                    }
                    
                    const resBadgeCard = val.isNew ? '<div style="margin-top:5px;"><span class="badge-new" style="margin-left:0;">NEW!</span></div>' : '';
                    
                    const el = document.createElement('div');
                    el.className = 'card' + (val.lock ? ' locked' : '');
                    el.innerHTML = `<div style=\"font-size:2.5rem; margin-bottom:10px\">${icon}</div><div style=\"font-weight:bold; text-transform:uppercase\">${key}</div>${resBadgeCard}`;
                    el.onclick = () => {
                        if(val.lock) return alert("Locked");
                        if(val.link && val.link !== "#") window.open(val.link, "_blank");
                        else alert("No link set.");
                    };
                    grid.appendChild(el);
                }
            });
        }
        
        nav('content', push, { subCode: currSub.code, wkObj: week });
    }

    function nav(id, push = true, stateData = {}) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
        document.getElementById(id+'-page').classList.add('active'); 
        window.scrollTo(0,0);
        
        if(push) {
            history.pushState({page: id, ...stateData}, null, "#" + id);
        }
    }
    
    window.onload = init;
</script>
</body>
</html>
