            el.className = 'res-item';
            el.style.cssText = 'flex-direction:column; border-left:4px solid #e91e8c; margin-bottom:18px;';
            const subOptions = (window.COURSE_DATA || []).map(s => `<option value="${s.code}" ${item.sub === s.code ? 'selected' : ''}>${s.code}</option>`).join('');
            const emojiOpts = NEWS_EMOJIS.map(em => `<button title="${em}" onclick="window.NEWS_DATA[${i}].emoji='${em}';markDirty();renderNewsManager();" style="background:none;border:none;cursor:pointer;font-size:1.2rem;padding:3px 5px;border-radius:5px;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='none'">${em}</button>`).join('');
            el.innerHTML = `
                <div style="display:flex;justify-content:space-between;width:100%;align-items:center;margin-bottom:12px;">
                    <strong style="color:white;font-size:1rem;">${escHtml(item.emoji||'📢')} ${escHtml(item.title||'Announcement')}</strong>
                    <button class="btn btn-del" onclick="delNewsEntry(${i})">✕ Remove</button>
                </div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;">
                    <div style="position:relative;flex:0 0 80px;">
                        <label>Emoji</label>
                        <input type="text" value="${escAttr(item.emoji||'📢')}" style="width:100%;text-align:center;font-size:1.4rem;padding:4px;" onfocus="showEmojiPicker(this)" oninput="window.NEWS_DATA[${i}].emoji=this.value;markDirty();">
                        <div class="emoji-picker-dropdown" style="display:none;"></div>
                    </div>
                    <div style="flex:1;min-width:160px;">
                        <label>Title</label>
                        <input type="text" value="${escAttr(item.title||'')}" placeholder="e.g. DS Lecture Cancelled" oninput="window.NEWS_DATA[${i}].title=this.value;markDirty();">
                    </div>
                    <div style="flex:0 0 190px;">
                        <label>Published At</label>
                        <input type="datetime-local" value="${escAttr(item.publishedAt?item.publishedAt.slice(0,16):'')}" style="padding:8px 10px;color-scheme:dark;width:100%;" oninput="window.NEWS_DATA[${i}].publishedAt=this.value ? this.value+':00' : ''; markDirty();">
                    </div>
                    <div style="flex:0 0 130px;">
                        <label>Subject (opt.)</label>
                        <select oninput="window.NEWS_DATA[${i}].sub=this.value;markDirty();">
                            <option value="">-- All --</option>
                            ${subOptions}
                        </select>
                    </div>
                </div>
                <div style="width:100%;margin-bottom:10px;">
                    <label>Body / Note</label>
                    <textarea rows="2" placeholder="Details, links, or extra context..." oninput="window.NEWS_DATA[${i}].body=this.value;markDirty();">${escHtml(item.body||'')}</textarea>
                </div>
                <div style="display:flex;flex-direction:column;gap:0;">
                    <div style="background:rgba(255,255,255,0.05);padding:15px;border-radius:8px;margin-bottom:15px;display:flex;flex-direction:column;width:100%;box-sizing:border-box;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                                <input type="checkbox" ${item.hasEvent?'checked':''} onchange="window.NEWS_DATA[${i}].hasEvent=this.checked;markDirty();renderNewsManager();">
                                <span style="color:#00E5FF;font-weight:700;">🗓️ Is a scheduled event?</span>
                            </label>
                            <button class="btn" style="border:1px solid #00E5FF; color:#00E5FF; background:transparent; padding:3px 8px; font-size:0.75rem; border-radius:4px;" onclick="autoDetectDateTime(${i}, 'event')">✨ Auto</button>
                        </div>
                        ${item.hasEvent ? `<div style="display:flex;flex-wrap:wrap;align-items:center;gap:15px;width:100%;">
                            <div style="flex:1;min-width:130px;"><label>Event Date</label><input type="date" value="${escAttr(item.eventDate||'')}" style="padding:8px 10px;color-scheme:dark;width:100%;" oninput="window.NEWS_DATA[${i}].eventDate=this.value;markDirty();"></div>
                            <div style="flex:1;min-width:130px;"><label>Event Time</label><input type="time" value="${escAttr(item.eventTime||'')}" style="padding:8px 10px;color-scheme:dark;width:100%;" oninput="window.NEWS_DATA[${i}].eventTime=this.value;markDirty();"></div>
                        </div>` : ''}
                    </div>
                    <div style="background:rgba(255,255,255,0.05);padding:15px;border-radius:8px;margin-bottom:15px;display:flex;flex-direction:column;width:100%;box-sizing:border-box;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                                <input type="checkbox" ${item.hasDeadline?'checked':''} onchange="window.NEWS_DATA[${i}].hasDeadline=this.checked;markDirty();renderNewsManager();">
                                <span style="color:#ff9500;font-weight:700;">⏰ Has Deadline</span>
                            </label>
                            <button class="btn" style="border:1px solid #ff9500; color:#ff9500; background:transparent; padding:3px 8px; font-size:0.75rem; border-radius:4px;" onclick="autoDetectDateTime(${i}, 'deadline')">✨ Auto</button>
                        </div>
                        ${item.hasDeadline ? `<div style="display:flex;flex-wrap:wrap;align-items:center;gap:15px;width:100%;">
                            <div style="flex:1;min-width:130px;"><label>Deadline Date</label><input type="date" value="${escAttr(item.deadlineDate||'')}" style="padding:8px 10px;color-scheme:dark;width:100%;" oninput="window.NEWS_DATA[${i}].deadlineDate=this.value;markDirty();"></div>
                            <div style="flex:1;min-width:130px;"><label>Deadline Time (e.g. 11:59 PM)</label><input type="text" value="${escAttr(item.deadlineTime||'')}" placeholder="11:59 PM" oninput="window.NEWS_DATA[${i}].deadlineTime=this.value;markDirty();"></div>
                        </div>` : ''}
                    </div>
                </div>
                <div><label style="color:#666;font-size:0.78rem;">Quick Emojis:</label><div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:4px;">${emojiOpts}</div></div>
            `;
            list.appendChild(el);
        });
    }

    function addNewsEntry() {
        if(typeof window.NEWS_DATA === 'undefined') window.NEWS_DATA = [];
        window.NEWS_DATA.unshift({ emoji:'📢', title:'New Announcement', body:'', publishedAt: new Date().toISOString().slice(0,19), sub:'', hasEvent:false, eventDate:'', eventTime:'', hasDeadline:false, deadlineDate:'', deadlineTime:'' });
        markDirty();
        renderNewsManager();
    }

    function delNewsEntry(i) {
        if(confirm('Remove this announcement?')) { window.NEWS_DATA.splice(i,1); markDirty(); renderNewsManager(); }
    }

    function autoDetectDateTime(idx, type) {
        if(typeof window.NEWS_DATA === 'undefined') window.NEWS_DATA = [];
        const item = window.NEWS_DATA[idx];
        if (!item || !item.body) {
            alert('Please enter some text in the Body / Note first.');
            return;
        }
        
        const txt = item.body.toLowerCase();
        let foundDate = null;
        let foundTime = null;
        // Robust time extraction: 9:30 am, 9 am, 21:00, 9pm, 9:00PM, etc.
        const timeRegexes = [
            /(\d{1,2})(?::(\d{2}))?\s*(am|pm)/i,
            /(\d{1,2}):(\d{2})/,
            /(\d{1,2})\s*(am|pm)/i
        ];
        for (const re of timeRegexes) {
            const m = txt.match(re);
            if (m) {
                let hr = parseInt(m[1], 10);
                let min = m[2] ? parseInt(m[2], 10) : 0;
                let ampm = m[3] || m[2] || '';
                if (typeof ampm === 'string') ampm = ampm.toLowerCase();
                if (ampm === 'pm' && hr < 12) hr += 12;
                if (ampm === 'am' && hr === 12) hr = 0;
                if (ampm === 'am' || ampm === 'pm') {
                    foundTime = `${hr.toString().padStart(2, '0')}:${min.toString().padStart(2, '0')}`;
                } else if (re === timeRegexes[1]) {
                    foundTime = `${hr.toString().padStart(2, '0')}:${min.toString().padStart(2, '0')}`;
                }
                break;
            }
        }
        // Date extraction: YYYY-MM-DD, DD/MM, Month Day
        const today = new Date();
        if (txt.includes('tomorrow')) {
            const tmr = new Date();
            tmr.setDate(today.getDate() + 1);
            foundDate = tmr.toISOString().split('T')[0];
        } else if (txt.includes('today')) {
            foundDate = today.toISOString().split('T')[0];
        } else {
            // YYYY-MM-DD
            const ymd = txt.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
            if (ymd) {
                foundDate = `${ymd[1]}-${ymd[2].padStart(2,'0')}-${ymd[3].padStart(2,'0')}`;
            } else {
                // DD/MM or D/M
                const dmMatch = txt.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/);
                if (dmMatch) {
                    let d = parseInt(dmMatch[1], 10);
                    let m = parseInt(dmMatch[2], 10);
                    let y = dmMatch[3] ? parseInt(dmMatch[3], 10) : today.getFullYear();
                    if (y < 100) y += 2000;
                    if (m > 12) { const temp = d; d = m; m = temp; }
                    foundDate = `${y}-${m.toString().padStart(2, '0')}-${d.toString().padStart(2, '0')}`;
                } else {
                    // Month name + day
                    const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec', 'january', 'february', 'march', 'april', 'may', 'june', 'july', 'august', 'september', 'october', 'november', 'december'];
                    const monthMatch = txt.match(new RegExp(`(${months.join('|')})[a-z]*\\s+(\\d{1,2})(?:st|nd|rd|th)?`, 'i'));
                    if (monthMatch) {
                        const mName = monthMatch[1].toLowerCase().substring(0,3);
                        const shortMonths = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
                        let mStr = (shortMonths.indexOf(mName) + 1).toString().padStart(2, '0');
                        let dStr = parseInt(monthMatch[2], 10).toString().padStart(2, '0');
                        foundDate = `${today.getFullYear()}-${mStr}-${dStr}`;
                    }
                }
            }
        }
        if (!foundDate && !foundTime) {
            alert('No date/time found in text.');
            return;
        }
        if (type === 'event') {
            if (foundDate) item.eventDate = foundDate;
            if (foundTime) item.eventTime = foundTime;
            item.hasEvent = true;
        } else {
            if (foundDate) item.deadlineDate = foundDate;
            if (foundTime) item.deadlineTime = foundTime;
            item.hasDeadline = true;
        }
        markDirty();
        renderNewsManager();
    }

    // --- EMOJI PICKER ---
    const SUGGESTED_EMOJIS = [
        '📚','📖','📗','📘','📙','📝','📌','📎','🗂️','🗃️',
        '🔗','🌐','💻','📱','🎬','🎧','🎵','📹','📷','🎨',
        '🧠','💡','⭐','🔥','🚀','🎯','🛠️','⚙️','🔍','📧',
        '📁','📅','📊','📈','✅','❌','⚠️','ℹ️','🏆','🎓',
        '💬','💭','📢','📰','🧪','🤖','💾','💿',
        '⏳','⌨️','▶️','☝️','✔️','❓','🌟','🎙️','👥','📂',
        '📄','📋','📜','📤','📬','📸','📽️','🔁','🔧','🔬','🗓️'
    ];

    function showEmojiPicker(inputEl) {
        // Close any other open picker
        document.querySelectorAll('.emoji-picker-dropdown').forEach(d => d.style.display = 'none');
        const dropdown = inputEl.parentElement.querySelector('.emoji-picker-dropdown');
        if(!dropdown) return;
        dropdown.innerHTML = SUGGESTED_EMOJIS.map(e =>
            `<button class="emoji-opt" type="button" onmousedown="event.preventDefault(); pickEmoji(this, '${e}')">${e}</button>`
        ).join('');
        dropdown.style.display = 'grid';
        // Close on outside click
        setTimeout(() => {
            const handler = (ev) => {
                if(!dropdown.contains(ev.target) && ev.target !== inputEl) {
                    dropdown.style.display = 'none';
                    document.removeEventListener('click', handler);
                }
            };
            document.addEventListener('click', handler);
        }, 0);
    }

    function pickEmoji(btn, emoji) {
        const dropdown = btn.closest('.emoji-picker-dropdown');
        const input = dropdown.parentElement.querySelector('input');
        input.value = emoji;
        input.dispatchEvent(new Event('input', { bubbles: true }));
        dropdown.style.display = 'none';
    }

    function buildPreviewPayload() {
        const snapshot = {
            CONFIG: window.CONFIG || {},
            COURSE_DATA: window.COURSE_DATA || [],
            SUBJECT_DETAILS_DATA: window.SUBJECT_DETAILS_DATA || {},
            SCHEDULE_DATA: window.SCHEDULE_DATA || [],
            MIDTERM_DATA: window.MIDTERM_DATA || [],
            FINAL_DATA: window.FINAL_DATA || [],
            STAFF_DATA: window.STAFF_DATA || [],
            TIMETABLE_DATA: window.TIMETABLE_DATA || {},
            UPDATES_DATA: window.UPDATES_DATA || [],
            NEWS_DATA: window.NEWS_DATA || []
        };
        try {
            return JSON.parse(JSON.stringify(snapshot));
        } catch (e) {
            return snapshot;
        }
    }

    function broadcastToPreview() {
        if (!previewEnabled) return;
        const frame = document.getElementById('preview-frame');
        if (!frame || !frame.contentWindow) return;
        frame.contentWindow.postMessage({ type: 'LIVE_UPDATE', payload: buildPreviewPayload() }, '*');
    }

    function schedulePreviewBroadcast() {
        if (!previewEnabled) return;
        if (previewDebounceTimer) clearTimeout(previewDebounceTimer);
        previewDebounceTimer = setTimeout(() => {
            previewDebounceTimer = null;
            broadcastToPreview();
        }, 300);
    }

    function togglePreview() {
        previewEnabled = !previewEnabled;
        document.body.classList.toggle('preview-on', previewEnabled);
        const btn = document.getElementById('preview-toggle-btn');
        if (btn) btn.textContent = previewEnabled ? '🧩 Hide Preview' : '🖥️ Toggle Preview';
        if (previewEnabled) schedulePreviewBroadcast();
    }

    // --- UNSAVED CHANGES WARNING ---
    let isDirty = false;
    let dataSnapshot = '';

    function takeSnapshot() {
        dataSnapshot = JSON.stringify({ c: window.COURSE_DATA, sd: window.SUBJECT_DETAILS_DATA, s: window.SCHEDULE_DATA, m: window.MIDTERM_DATA, f: window.FINAL_DATA, st: window.STAFF_DATA, tt: window.TIMETABLE_DATA, cfg: window.CONFIG, u: window.UPDATES_DATA, n: window.NEWS_DATA });
    }

    function markDirty() {
        const current = JSON.stringify({ c: window.COURSE_DATA, sd: window.SUBJECT_DETAILS_DATA, s: window.SCHEDULE_DATA, m: window.MIDTERM_DATA, f: window.FINAL_DATA, st: window.STAFF_DATA, tt: window.TIMETABLE_DATA, cfg: window.CONFIG, u: window.UPDATES_DATA, n: window.NEWS_DATA });
        isDirty = current !== dataSnapshot;
        schedulePreviewBroadcast();
    }

    // Listen for changes on all inputs
    document.addEventListener('input', function() { markDirty(); schedulePreviewBroadcast(); });
    document.addEventListener('change', function() { markDirty(); schedulePreviewBroadcast(); });

    window.addEventListener('beforeunload', function(e) {
        if(isDirty) {
            e.preventDefault();
            e.returnValue = 'You have unsaved changes. Are you sure you want to leave?';
            return e.returnValue;
        }
    });

    // Override saveData to clear dirty flag
    const _origSave = window.saveData;
    window.saveData = function() {
        _origSave();
        takeSnapshot();
        isDirty = false;
    };

    // Ctrl+S to save
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            window.saveData();
        }
    });

    init();
    takeSnapshot();

    const previewFrame = document.getElementById('preview-frame');
    if (previewFrame) {
        previewFrame.addEventListener('load', function() {
            if (previewEnabled) schedulePreviewBroadcast();
        });
    }
</script>
