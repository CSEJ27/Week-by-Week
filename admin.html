<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Admin Dashboard</title>
    <style>
        :root { --bg: #0a0012; --panel: #1a0d2e; --accent: #e91e8c; --text: #fff; --hover: rgba(233,30,140,0.1); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        .sidebar { width: 300px; background: #130822; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .middle { width: 350px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 20px; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; }
        
        .panel-header { padding: 15px; background: #240b3b; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        .list-container { flex: 1; overflow-y: auto; }
        .list-item { padding: 10px; border-bottom: 1px solid #2a1b3d; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background 0.2s; }
        .list-item:hover { background: var(--hover); }
        .list-item.active { background: var(--accent); color: white; font-weight: bold; border-left: 5px solid white; }
        .list-item.dragging { opacity: 0.5; background: #444; }
        .drag-handle { cursor: grab; color: #666; font-size: 1.2rem; padding:0 5px; }
        
        .btn { border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; color: white; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn-add { background: #4a90e2; width: 100%; padding: 12px; margin-top: auto; border-radius: 0; }
        .btn-del { background: #e91e8c; font-size: 0.8rem; padding: 2px 6px; margin-left: auto; border-radius: 4px; }
        .btn-save { background: #00c853; padding: 15px 40px; font-size: 1.2rem; position: fixed; bottom: 30px; right: 30px; box-shadow: 0 0 20px rgba(0,200,83,0.4); z-index: 1000; border-radius: 50px; }
        .btn-config { width: 100%; background: #333; padding: 15px; text-align: left; font-weight: bold; border-bottom: 1px solid #444; color: #ccc; cursor: pointer; }
        .btn-recents { width: 100%; background: #4a90e2; padding: 15px; text-align: left; font-weight: bold; border-bottom: 1px solid #444; color: white; cursor: pointer; }
        .btn-schedule { width: 100%; background: #ff9500; padding: 15px; text-align: left; font-weight: bold; border-bottom: 1px solid #444; color: black; cursor: pointer; }
        .btn-expire { width: 100%; background: #673ab7; padding: 15px; text-align: left; font-weight: bold; border-bottom: 1px solid #444; color: white; cursor: pointer; }
        .btn-move { background: transparent; color: #aaa; font-size: 0.8rem; padding: 2px 5px; border: 1px solid #444; border-radius: 3px; }
        .btn-move:hover { background: #444; color: white; }
        
        .bulk-toolbar { padding: 8px; background: #240b3b; display: flex; gap: 5px; flex-wrap: wrap; border-bottom: 1px solid #444; }
        .btn-bulk { background: #444; font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; color: #ddd; border: none; cursor: pointer; flex: 1; text-align: center; }
        
        .form-section { background: #24123b; padding: 20px; border-radius: 12px; border: 1px solid #444; margin-bottom: 20px; }
        h3 { margin-top: 0; color: var(--accent); border-bottom: 1px solid #444; padding-bottom: 10px; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9rem; font-weight:bold; }
        input[type="text"], textarea, select { width: 100%; padding: 8px; background: #0a0012; border: 1px solid #444; color: white; border-radius: 4px; margin-bottom: 10px; font-family: inherit; }
        input[type="color"] { width: 100%; height: 40px; padding: 0; border: 2px solid #555; background: none; cursor: pointer; border-radius: 4px; }
        input[type="text"]:focus, textarea:focus, select:focus { border-color: var(--accent); outline: none; }
        
        .checkbox-row { display: flex; gap: 15px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .checkbox-label { display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; font-size: 0.9rem; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 4px; }
        input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
        
        .res-item { display: flex; gap: 10px; padding: 15px; background: #150a25; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; align-items: flex-start; }
        .res-content { flex: 1; }
        .res-header { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; flex-wrap: wrap; gap: 10px; }
        .badge-new { background: var(--accent); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .btn-time { background: #333; border: 1px solid #555; padding: 2px 8px; margin-left: 5px; font-size: 0.8rem; cursor: pointer; color: white; border-radius: 4px; }
        
        .recent-manager-item { display: flex; justify-content: space-between; align-items: center; background: #150a25; padding: 10px; margin-bottom: 5px; border-bottom: 1px solid #333; font-size: 0.9rem; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0012; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div onclick="toggleConfig()" class="btn-config">⚙️ CONFIG & HELP LINK</div>
    <div onclick="toggleRecents()" class="btn-recents">📜 MANAGE HISTORY</div>
    <div onclick="toggleSchedule()" class="btn-schedule">📅 MANAGE SCHEDULE</div>
    <div onclick="autoExpireBadges()" class="btn-expire">⏳ AUTO-EXPIRE NEW</div>
    
    <div class="panel-header">SUBJECTS</div>
    <div id="subject-list" class="list-container"></div>
    <button class="btn btn-add" onclick="addSubject()">+ Add Subject</button>
</div>

<div class="middle" id="middle-col">
    </div>

<div class="main">
    <div id="editor-area" style="max-width: 900px; margin: 0 auto; width: 100%;">
        <div style="text-align:center; color:#666; margin-top:50px;">Select a subject and week.</div>
    </div>
</div>

<button class="btn btn-save" onclick="saveData()">💾 SAVE & DOWNLOAD</button>

<script src="course_data.js"></script>
<script>
    let cIdx = 0; let wIdx = 0; let schWIdx = 0; let dragSrcIndex = null; let viewMode = 'editor';

    // Global colors helper for previewing dynamically colored subjects
    function getSubjectColorFallback(code) {
        const colors = { 'CA': '#ff9500', 'DSA': '#34c759', 'DB': '#007aff', 'OS': '#ff2d55', 'CN': '#af52de', 'AI': '#ffcc00' };
        return colors[code] || '#e91e8c';
    }

    function getSubjectColor(code) { 
        if(window.COURSE_DATA) {
            const s = window.COURSE_DATA.find(x => x.code === code);
            if(s && s.color) return s.color;
        }
        return getSubjectColorFallback(code);
    }

    function init() {
        if(typeof window.COURSE_DATA === 'undefined') window.COURSE_DATA = [];
        if(typeof window.CONFIG === 'undefined') window.CONFIG = { resources: [], helpLink: "#", taskPresets: [] };
        
        // Ensure taskPresets exists
        if(!window.CONFIG.taskPresets || window.CONFIG.taskPresets.length === 0) {
            window.CONFIG.taskPresets = [
                { name: "Quiz", icon: "🧠" },
                { name: "Assignment", icon: "📝" },
                { name: "Mini Project", icon: "🚀" },
                { name: "Report", icon: "📊" },
                { name: "Lab Exam", icon: "🧪" },
                { name: "Midterm", icon: "🎓" },
                { name: "Final", icon: "🏁" }
            ];
        }

        // Load old hardcoded schedule if new structure doesn't exist yet
        if(typeof window.SCHEDULE_DATA === 'undefined') {
            window.SCHEDULE_DATA = [
                { week: 1, tasks: [] }, { week: 2, tasks: [] }, { week: 3, tasks: [] }, { week: 4, tasks: [] },
                { week: 5, tasks: [ { sub: 'DSA', name: 'Quiz', icon: '🧠' }, { sub: 'DB', name: 'Quiz', icon: '🧠' }, { sub: 'OS', name: 'Quiz', icon: '🧠' } ] },
                { week: 6, tasks: [ { sub: 'CA', name: 'Quiz', icon: '🧠' }, { sub: 'AI', name: 'Quiz', icon: '🧠' } ] },
                { week: 7, tasks: [ { sub: 'CA', name: 'Assignment', icon: '📝' }, { sub: 'DB', name: 'Mini Project', icon: '🚀' }, { sub: 'CN', name: 'Quiz', icon: '🧠' } ] },
                { week: 8, tasks: [] }, 
                { week: 9, tasks: [ { sub: 'DSA', name: 'Quiz', icon: '🧠' }, { sub: 'DB', name: 'Quiz', icon: '🧠' } ] },
                { week: 10, tasks: [ { sub: 'OS', name: 'Mini Project', icon: '🚀' }, { sub: 'CN', name: 'Assignment', icon: '📝' } ] },
                { week: 11, tasks: [ { sub: 'CA', name: 'Assignment', icon: '📝' }, { sub: 'OS', name: 'Report Presentation', icon: '📊' } ] },
                { week: 12, tasks: [ { sub: 'DSA', name: 'Quiz', icon: '🧠' }, { sub: 'OS', name: 'Quiz', icon: '🧠' } ] },
                { week: 13, tasks: [ { sub: 'DSA', name: 'Mini Project', icon: '🚀' }, { sub: 'DB', name: 'Mini Project', icon: '🚀' }, { sub: 'OS', name: 'Assignment', icon: '📝' }, { sub: 'AI', name: 'Quiz', icon: '🧠' } ] },
                { week: 14, tasks: [ { sub: 'CA', name: 'Quiz', icon: '🧠' }, { sub: 'DB', name: 'Mini Project', icon: '🚀' }, { sub: 'CN', name: 'Quiz', icon: '🧠' }, { sub: 'AI', name: 'Mini Project', icon: '🚀' } ] },
                { week: 15, tasks: [ { sub: 'CA', name: 'Assignment', icon: '📝' }, { sub: 'CN', name: 'Mini Project', icon: '🚀' } ] }
            ];
            window.SCHEDULE_DATA.forEach(wk => {
                wk.tasks.forEach(t => {
                    t.when = t.when || "";
                    t.where = t.where || "";
                    t.coverage = t.coverage || "";
                    t.note = t.note || "";
                });
            });
        }

        if(!window.CONFIG.resources || window.CONFIG.resources.length === 0) {
            window.CONFIG.resources = [
                { name: "Guide (Explanation)", icon: "📘", defaultDesc: "" },
                { name: "Guide (Solving)", icon: "📝", defaultDesc: "" },
                { name: "Voice Recording", icon: "🎙️", defaultDesc: "" },
                { name: "Lecture", icon: "▶️", defaultDesc: "" },
                { name: "Section", icon: "👥", defaultDesc: "" },
                { name: "Notes", icon: "💡", defaultDesc: "" },
                { name: "Slides", icon: "📄", defaultDesc: "" },
                { name: "Sheet", icon: "📋", defaultDesc: "" },
                { name: "Lab", icon: "🧪", defaultDesc: "" },
                { name: "Quiz", icon: "❓", defaultDesc: "" },
                { name: "Answers", icon: "✅", defaultDesc: "" },
                { name: "Alt 1", icon: "🎬", defaultDesc: "" },
                { name: "Alt 2", icon: "🎬", defaultDesc: "" }
            ];
        }

        window.COURSE_DATA.forEach(sub => {
            if(!sub.weeks) sub.weeks = [];
            sub.weeks.forEach(wk => {
                if(!wk.resources) wk.resources = {};
                window.CONFIG.resources.forEach(conf => {
                    if(!wk.resources[conf.name]) {
                        wk.resources[conf.name] = { 
                            vis:false, lock:false, link:"#", desc:conf.defaultDesc, 
                            isNew:false, isRecent:false, recentDate:"" 
                        };
                    }
                });
            });
        });

        renderSubjects();
        renderEditor();
    }

    function toggleConfig() { setView('config'); renderConfigEditor(); }
    function toggleRecents() { setView('recents'); renderRecentsManager(); }
    function toggleSchedule() { setView('schedule'); renderScheduleWeeks(); renderScheduleEditor(); }
    function exitView() { setView('editor'); renderSubjects(); renderWeeks(); renderEditor(); }

    function setView(mode) {
        viewMode = mode;
        const mid = document.getElementById('middle-col');
        
        if(mode === 'editor') {
            mid.style.display = 'flex';
        } else if (mode === 'schedule') {
            mid.style.display = 'flex';
        } else {
            mid.style.display = 'none';
        }
    }

    // --- NORMAL EDITOR ---
    function renderSubjects() {
        const list = document.getElementById('subject-list');
        list.innerHTML = '';
        window.COURSE_DATA.forEach((sub, i) => {
            const el = document.createElement('div');
            el.className = `list-item ${i === cIdx && viewMode==='editor' ? 'active' : ''}`;
            el.draggable = true;
            el.addEventListener('dragstart', (e) => handleDragStart(e, i, 'sub'));
            el.addEventListener('dragover', handleDragOver);
            el.addEventListener('drop', (e) => handleDrop(e, i, 'sub'));
            
            el.innerHTML = `
                <span class="drag-handle">☰</span>
                <div style="flex:1">${sub.code || 'New'}</div>
                <button class="btn-move" onclick="moveItem(event, 'sub', ${i}, -1)">▲</button>
                <button class="btn-move" onclick="moveItem(event, 'sub', ${i}, 1)">▼</button>
                <button class="btn btn-del" onclick="delSubject(event, ${i})">✕</button>
            `;
            el.onclick = (e) => { if(e.target.tagName !== 'BUTTON') { cIdx = i; wIdx = 0; exitView(); } };
            list.appendChild(el);
        });
        if(window.COURSE_DATA.length > 0 && viewMode === 'editor') renderWeeks();
    }

    function renderWeeks() {
        const mid = document.getElementById('middle-col');
        mid.innerHTML = `
            <div class="panel-header">WEEKS</div>
            <div class="bulk-toolbar">
                <button class="btn-bulk" onclick="bulkWeek('locked', true)">Lock All</button>
                <button class="btn-bulk" onclick="bulkWeek('locked', false)">Unlock</button>
                <button class="btn-bulk" onclick="bulkWeek('isNew', true)">New All</button>
                <button class="btn-bulk" onclick="bulkWeek('isNew', false)">Old All</button>
            </div>
            <div id="week-list" class="list-container"></div>
            <button class="btn btn-add" onclick="addWeek()">+ Add Week</button>
        `;
        
        const list = document.getElementById('week-list');
        const sub = window.COURSE_DATA[cIdx];
        if(!sub) return;
        sub.weeks.forEach((wk, i) => {
            const el = document.createElement('div');
            el.className = `list-item ${i === wIdx ? 'active' : ''}`;
            el.draggable = true;
            el.addEventListener('dragstart', (e) => handleDragStart(e, i, 'week'));
            el.addEventListener('dragover', handleDragOver);
            el.addEventListener('drop', (e) => handleDrop(e, i, 'week'));
            
            el.innerHTML = `
                <span class="drag-handle">☰</span>
                <div style="flex:1">${wk.title} ${wk.isNew ? '★' : ''}</div>
                <button class="btn-move" onclick="moveItem(event, 'week', ${i}, -1)">▲</button>
                <button class="btn-move" onclick="moveItem(event, 'week', ${i}, 1)">▼</button>
                <button class="btn btn-del" onclick="delWeek(event, ${i})">✕</button>
            `;
            el.onclick = (e) => { if(e.target.tagName !== 'BUTTON') { wIdx = i; renderWeeks(); renderEditor(); } };
            list.appendChild(el);
        });
    }

    function renderEditor() {
        if(viewMode !== 'editor') return;
        const container = document.getElementById('editor-area');
        if(!window.COURSE_DATA[cIdx]) { container.innerHTML = ''; return; }
        const sub = window.COURSE_DATA[cIdx];
        const week = sub.weeks[wIdx];
        
        let html = `
            <div class="form-section">
                <h3>Subject Details</h3>
                <div style="display:grid; grid-template-columns: 1fr 3fr; gap:10px;">
                    <div><label>Code</label><input type="text" value="${sub.code}" oninput="updateData('sub', 'code', this.value)" onblur="renderSubjects()"></div>
                    <div><label>Name</label><input type="text" value="${sub.name}" oninput="updateData('sub', 'name', this.value)"></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 2fr; gap:10px; margin-top:10px;">
                    <div><label>Credits</label><input type="text" value="${sub.credits}" oninput="updateData('sub', 'credits', this.value)"></div>
                    <div><label>Semester</label><input type="text" value="${sub.semester}" oninput="updateData('sub', 'semester', this.value)"></div>
                    <div><label>Color</label><input type="color" value="${sub.color || getSubjectColorFallback(sub.code)}" oninput="updateData('sub', 'color', this.value)"></div>
                    <div><label>Drive Link</label><input type="text" placeholder="https://drive..." value="${sub.driveLink || ''}" oninput="updateData('sub', 'driveLink', this.value)"></div>
                </div>
            </div>`;

        if(week) {
            html += `
            <div class="form-section">
                <h3>Week Details</h3>
                <label>Title</label><input type="text" value="${week.title}" oninput="updateData('week', 'title', this.value)" onblur="renderWeeks()">
                
                <div class="checkbox-row" style="background:#150a25; padding:10px; border-radius:8px;">
                    <label class="checkbox-label"><input type="checkbox" ${week.locked ? 'checked' : ''} onchange="updateData('week', 'locked', this.checked)"> Locked</label>
                    <label class="checkbox-label"><input type="checkbox" ${week.isNew ? 'checked' : ''} onchange="updateData('week', 'isNew', this.checked); renderWeeks()"> New!</label>
                    <div style="display:flex; align-items:center; gap:5px; background:#2a1b3d; padding:2px 8px; border-radius:4px; border:1px solid #444;">
                        <label class="checkbox-label"><input type="checkbox" ${week.isRecent ? 'checked' : ''} onchange="updateData('week', 'isRecent', this.checked)"> <span style="color:#4a90e2">History</span></label>
                        <input type="text" style="width:140px; margin:0; font-size:0.8rem;" placeholder="Date..." value="${week.recentDate || ''}" oninput="updateData('week', 'recentDate', this.value)">
                        <button class="btn-time" onclick="setNowWeek()">🕒</button>
                    </div>
                </div>

                <div style="background:#150a25; padding:10px; border-radius:8px; margin-top:10px;">
                    <div class="checkbox-row">
                        <label class="checkbox-label" style="font-weight:bold; color:var(--accent);">Custom Badge (Top Right):</label>
                        <label class="checkbox-label"><input type="checkbox" ${week.showBadge ? 'checked' : ''} onchange="updateData('week', 'showBadge', this.checked)"> Enable</label>
                    </div>
                    <div style="display:grid; grid-template-columns: 3fr 1fr; gap:10px;">
                        <input type="text" placeholder="Text (e.g. Midterm)" value="${week.badgeText || ''}" oninput="updateData('week', 'badgeText', this.value)">
                        <input type="color" value="${week.badgeColor || '#e91e8c'}" oninput="updateData('week', 'badgeColor', this.value)">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #444; padding-bottom:10px; margin-bottom:15px;">
                    <h3 style="border:none; margin:0; padding:0;">Resources</h3>
                    <div class="bulk-toolbar" style="border:none; background:transparent; padding:0;">
                        <button class="btn-bulk" onclick="bulkRes('vis', true)">Show All</button>
                        <button class="btn-bulk" onclick="bulkRes('vis', false)">Hide All</button>
                        <button class="btn-bulk" onclick="bulkRes('lock', true)">Lock All</button>
                        <button class="btn-bulk" onclick="bulkRes('lock', false)">Unlock</button>
                        <button class="btn-bulk" onclick="bulkRes('isNew', true)">New All</button>
                        <button class="btn-bulk" onclick="bulkRes('isNew', false)">Old All</button>
                    </div>
                </div>
                <div id="res-list-container"></div>
            </div>`;
        } else {
            html += `<p style="text-align:center;">No weeks. Click "+ Add Week".</p>`;
        }
        container.innerHTML = html;
        if(week) renderResources(week);
    }

    function renderResources(week) {
        const container = document.getElementById('res-list-container');
        window.CONFIG.resources.forEach((conf, i) => {
            const key = conf.name;
            if(!week.resources[key]) week.resources[key] = { vis:false, lock:false, link:"#", desc:conf.defaultDesc, isNew:false };
            const val = week.resources[key];

            const el = document.createElement('div');
            el.className = 'res-item';
            el.innerHTML = `
                <div style="display:flex; flex-direction:column; gap:2px;">
                    <div style="font-size:1.5rem;">${conf.icon}</div>
                </div>
                <div class="res-content">
                    <div class="res-header">
                        <strong>${key}</strong>
                        <div class="checkbox-row" style="margin:0; gap:10px;">
                            <label class="checkbox-label"><input type="checkbox" ${val.vis ? 'checked' : ''} onchange="updateRes('${key}', 'vis', this.checked)"> Show</label>
                            <label class="checkbox-label"><input type="checkbox" ${val.lock ? 'checked' : ''} onchange="updateRes('${key}', 'lock', this.checked)"> Lock</label>
                            <label class="checkbox-label"><input type="checkbox" ${val.isNew ? 'checked' : ''} onchange="updateRes('${key}', 'isNew', this.checked)"> New</label>
                            
                            <div style="display:flex; align-items:center; gap:5px; background:#2a1b3d; padding:2px 8px; border-radius:4px; border:1px solid #444;">
                                <label class="checkbox-label"><input type="checkbox" ${val.isRecent ? 'checked' : ''} onchange="toggleRecentRes('${key}', this.checked)"> History</label>
                                <input type="text" style="width:140px; margin:0; font-size:0.8rem;" placeholder="Date..." value="${val.recentDate || ''}" oninput="updateRes('${key}', 'recentDate', this.value)">
                                <button class="btn-time" onclick="setNowRes('${key}')">🕒</button>
                            </div>
                        </div>
                    </div>
                    <input type="text" placeholder="Link/File..." value="${val.link}" oninput="updateRes('${key}', 'link', this.value)">
                    <textarea rows="2" placeholder="Notes..." oninput="updateRes('${key}', 'desc', this.value)">${val.desc}</textarea>
                </div>
            `;
            container.appendChild(el);
        });
    }

    // --- SCHEDULE EDITOR ---
    function renderScheduleWeeks() {
        const mid = document.getElementById('middle-col');
        mid.innerHTML = `
            <div class="panel-header" style="background:#ff9500; color:black;">SCHEDULE WEEKS</div>
            <div id="sch-week-list" class="list-container"></div>
            <button class="btn btn-add" style="background:#ff9500; color:black;" onclick="addScheduleWeek()">+ Add Schedule Week</button>
        `;
        
        const list = document.getElementById('sch-week-list');
        window.SCHEDULE_DATA.forEach((wk, i) => {
            const el = document.createElement('div');
            el.className = `list-item ${i === schWIdx ? 'active' : ''}`;
            if(i === schWIdx) el.style.borderLeftColor = "#ff9500";
            
            el.innerHTML = `
                <div style="flex:1">WEEK ${wk.week} <span style="font-size:0.7rem; background:#333; padding:2px 5px; border-radius:4px;">${wk.tasks.length} tasks</span></div>
                <button class="btn btn-del" onclick="delScheduleWeek(event, ${i})">✕</button>
            `;
            el.onclick = (e) => { if(e.target.tagName !== 'BUTTON') { schWIdx = i; renderScheduleWeeks(); renderScheduleEditor(); } };
            list.appendChild(el);
        });
    }

    function renderScheduleEditor() {
        const container = document.getElementById('editor-area');
        if(!window.SCHEDULE_DATA[schWIdx]) { container.innerHTML = ''; return; }
        
        const wk = window.SCHEDULE_DATA[schWIdx];
        
        let subOptions = '';
        window.COURSE_DATA.forEach(sub => {
            subOptions += `<option value="${sub.code}">${sub.code} - ${sub.name}</option>`;
        });

        // Generate dynamic presets from window.CONFIG.taskPresets
        let presetOptions = '<option value="" disabled selected>Preset...</option>';
        window.CONFIG.taskPresets.forEach(tp => {
            presetOptions += `<option value="${tp.icon}|${tp.name}">${tp.icon} ${tp.name}</option>`;
        });

        let html = `
            <div class="form-section" style="border-color:#ff9500;">
                <h3 style="color:#ff9500;">WEEK ${wk.week} Deliverables</h3>
                <label>Week Number:</label>
                <input type="number" style="width:100%; padding:8px; background:#0a0012; border:1px solid #444; color:white; margin-bottom:20px;" value="${wk.week}" oninput="window.SCHEDULE_DATA[schWIdx].week = this.value; renderScheduleWeeks();">
                
                <div id="sch-task-list"></div>
                
                <button class="btn btn-add" style="background:#ff9500; color:black; border-radius:4px; margin-top:20px;" onclick="addScheduleTask()">+ Add Deliverable to Week ${wk.week}</button>
            </div>
        `;
        container.innerHTML = html;

        const list = document.getElementById('sch-task-list');
        wk.tasks.forEach((task, tIdx) => {
            const el = document.createElement('div');
            el.className = 'res-item';
            el.style.flexDirection = 'column';
            el.style.borderLeft = `4px solid ${getSubjectColor(task.sub)}`;
            
            let myOpts = '';
            window.COURSE_DATA.forEach(sub => {
                myOpts += `<option value="${sub.code}" ${task.sub === sub.code ? 'selected' : ''}>${sub.code}</option>`;
            });

            el.innerHTML = `
                <div style="display:flex; justify-content:space-between; width:100%; align-items:center; margin-bottom:10px; gap:10px; flex-wrap:wrap;">
                    <select style="width:100px; margin:0;" onchange="updateSchTask(${tIdx}, 'sub', this.value); renderScheduleEditor();">
                        ${myOpts}
                    </select>
                    
                    <select style="width:140px; margin:0; font-size:0.85rem;" onchange="if(this.value){ const v=this.value.split('|'); updateSchTask(${tIdx}, 'icon', v[0]); updateSchTask(${tIdx}, 'name', v[1]); renderScheduleEditor(); }">
                        ${presetOptions}
                    </select>

                    <input type="text" placeholder="Icon" value="${task.icon}" style="width:50px; margin:0;" oninput="updateSchTask(${tIdx}, 'icon', this.value)">
                    <input type="text" placeholder="Task Name" value="${task.name}" style="flex:1; margin:0;" oninput="updateSchTask(${tIdx}, 'name', this.value)">
                    
                    <button class="btn btn-del" onclick="delScheduleTask(${tIdx})">✕ Remove</button>
                </div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; width:100%;">
                    <div><label>When?</label><input type="text" placeholder="e.g. Monday 10:00 AM" value="${task.when || ''}" oninput="updateSchTask(${tIdx}, 'when', this.value)"></div>
                    <div><label>Where?</label><input type="text" placeholder="e.g. Online / Hall 3" value="${task.where || ''}" oninput="updateSchTask(${tIdx}, 'where', this.value)"></div>
                    <div><label>Coverage?</label><input type="text" placeholder="e.g. Weeks 1 to 4" value="${task.coverage || ''}" oninput="updateSchTask(${tIdx}, 'coverage', this.value)"></div>
                </div>
                <label>Extra Notes:</label>
                <textarea rows="2" placeholder="e.g. Bring calculators" oninput="updateSchTask(${tIdx}, 'note', this.value)">${task.note || ''}</textarea>
            `;
            list.appendChild(el);
        });
    }

    function updateSchTask(tIdx, field, val) {
        window.SCHEDULE_DATA[schWIdx].tasks[tIdx][field] = val;
    }
    function addScheduleWeek() {
        const nextWeek = window.SCHEDULE_DATA.length + 1;
        window.SCHEDULE_DATA.push({ week: nextWeek, tasks: [] });
        schWIdx = window.SCHEDULE_DATA.length - 1;
        renderScheduleWeeks(); renderScheduleEditor();
    }
    function delScheduleWeek(e, i) {
        e.stopPropagation();
        if(confirm("Delete this entire schedule week?")) {
            window.SCHEDULE_DATA.splice(i, 1);
            schWIdx = 0;
            renderScheduleWeeks(); renderScheduleEditor();
        }
    }
    function addScheduleTask() {
        const firstSub = window.COURSE_DATA.length > 0 ? window.COURSE_DATA[0].code : "UNK";
        window.SCHEDULE_DATA[schWIdx].tasks.push({ sub: firstSub, name: "New Task", icon: "📝", when: "", where: "", coverage: "", note: "" });
        renderScheduleWeeks(); renderScheduleEditor();
    }
    function delScheduleTask(tIdx) {
        if(confirm("Remove this task?")) {
            window.SCHEDULE_DATA[schWIdx].tasks.splice(tIdx, 1);
            renderScheduleWeeks(); renderScheduleEditor();
        }
    }


    // --- CONFIG & HELPERS ---
    function renderConfigEditor() {
        const container = document.getElementById('editor-area');
        let helpLink = window.CONFIG.helpLink || "#";
        
        let html = `
            <div class="form-section">
                <h3>Global Settings</h3>
                <label><strong>"Help Us" Form Link</strong> (Paste your Google Form URL here)</label>
                <input type="text" value="${helpLink}" oninput="window.CONFIG.helpLink = this.value">
            </div>
            <div class="form-section">
                <h3>Manage Resources</h3>
                <div id="config-list"></div>
                <button class="btn btn-add" style="margin-top:10px" onclick="addConfigType()">+ Add New Resource Type</button>
            </div>
            <div class="form-section" style="border-color:#ff9500;">
                <h3 style="color:#ff9500;">Manage Schedule Presets</h3>
                <div id="config-task-list"></div>
                <button class="btn btn-add" style="margin-top:10px; background:#ff9500; color:black;" onclick="addConfigTaskPreset()">+ Add New Task Preset</button>
            </div>
        `;
        container.innerHTML = html;
        
        const list = document.getElementById('config-list');
        window.CONFIG.resources.forEach((res, i) => {
            const el = document.createElement('div');
            el.className = 'res-item';
            el.draggable = true;
            el.addEventListener('dragstart', (e) => handleDragStart(e, i, 'config'));
            el.addEventListener('dragover', handleDragOver);
            el.addEventListener('drop', (e) => handleDrop(e, i, 'config'));
            el.innerHTML = `
                <div class="drag-handle">☰</div>
                <div style="flex:1; display:flex; gap:10px;">
                    <div style="flex:0 0 50px;"><input type="text" value="${res.icon}" style="text-align:center" onchange="window.CONFIG.resources[${i}].icon=this.value"></div>
                    <div style="flex:1;"><input type="text" value="${res.name}" onchange="updateConfigName(${i}, this.value)"></div>
                </div>
                <button class="btn btn-del" onclick="delConfigType(${i})">✕</button>
            `;
            list.appendChild(el);
        });

        const taskList = document.getElementById('config-task-list');
        window.CONFIG.taskPresets.forEach((tp, i) => {
            const el = document.createElement('div');
            el.className = 'res-item';
            el.style.borderLeft = '4px solid #ff9500';
            el.draggable = true;
            el.addEventListener('dragstart', (e) => handleDragStart(e, i, 'configTask'));
            el.addEventListener('dragover', handleDragOver);
            el.addEventListener('drop', (e) => handleDrop(e, i, 'configTask'));
            el.innerHTML = `
                <div class="drag-handle">☰</div>
                <div style="flex:1; display:flex; gap:10px;">
                    <div style="flex:0 0 50px;"><input type="text" value="${tp.icon}" style="text-align:center" onchange="updateConfigTaskPreset(${i}, 'icon', this.value)"></div>
                    <div style="flex:1;"><input type="text" value="${tp.name}" onchange="updateConfigTaskPreset(${i}, 'name', this.value)"></div>
                </div>
                <button class="btn btn-del" onclick="delConfigTaskPreset(${i})">✕</button>
            `;
            taskList.appendChild(el);
        });
    }

    function addConfigTaskPreset() {
        window.CONFIG.taskPresets.push({ name: "New Preset", icon: "📌" });
        renderConfigEditor();
    }
    function delConfigTaskPreset(i) {
        if(confirm("Delete this preset?")) {
            window.CONFIG.taskPresets.splice(i, 1);
            renderConfigEditor();
        }
    }
    function updateConfigTaskPreset(i, field, val) {
        window.CONFIG.taskPresets[i][field] = val;
    }

    function updateData(scope, field, val) {
        if(scope === 'sub') window.COURSE_DATA[cIdx][field] = val;
        if(scope === 'week') window.COURSE_DATA[cIdx].weeks[wIdx][field] = val;
    }
    
    function updateRes(key, field, val) {
        window.COURSE_DATA[cIdx].weeks[wIdx].resources[key][field] = val;
    }
    
    function toggleRecentRes(key, checked) {
        updateRes(key, 'isRecent', checked);
        if(checked) {
            updateRes(key, 'vis', true); 
            renderEditor(); 
        }
    }
    
    function setNowWeek() { updateData('week', 'recentDate', getNowStr()); updateData('week', 'isRecent', true); renderEditor(); }
    function setNowRes(key) { 
        updateRes(key, 'recentDate', getNowStr()); 
        toggleRecentRes(key, true);
        renderEditor(); 
    }
    
    function getNowStr() {
        const now = new Date();
        const d = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`;
        let h = now.getHours(); const am = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
        const m = now.getMinutes().toString().padStart(2, '0');
        return `${d} ${h}:${m} ${am}`;
    }

    function moveItem(e, type, idx, dir) {
        e.stopPropagation();
        let arr;
        if(type === 'sub') arr = window.COURSE_DATA;
        else if(type === 'week') arr = window.COURSE_DATA[cIdx].weeks;
        if(idx + dir < 0 || idx + dir >= arr.length) return;
        [arr[idx], arr[idx+dir]] = [arr[idx+dir], arr[idx]];
        if(type === 'sub' && cIdx === idx) cIdx += dir;
        else if(type === 'week' && wIdx === idx) wIdx += dir;
        renderSubjects(); renderWeeks();
    }

    function handleDragStart(e, idx, type) { dragSrcIndex = idx; e.dataTransfer.setData('type', type); }
    function handleDragOver(e) { e.preventDefault(); }
    function handleDrop(e, dropIndex, type) {
        e.stopPropagation();
        const srcType = e.dataTransfer.getData('type');
        if(srcType !== type || dragSrcIndex === dropIndex) return;
        let arr;
        if(type === 'sub') { arr = window.COURSE_DATA; if(cIdx === dragSrcIndex) cIdx = dropIndex; }
        else if(type === 'week') { arr = window.COURSE_DATA[cIdx].weeks; if(wIdx === dragSrcIndex) wIdx = dropIndex; }
        else if(type === 'config') { arr = window.CONFIG.resources; }
        else if(type === 'configTask') { arr = window.CONFIG.taskPresets; }
        
        const item = arr.splice(dragSrcIndex, 1)[0];
        arr.splice(dropIndex, 0, item);
        
        if(type === 'sub') renderSubjects(); 
        else if(type === 'week') renderWeeks(); 
        else renderConfigEditor(); // Handles both 'config' and 'configTask'
    }

    function renderRecentsManager() {
        const container = document.getElementById('editor-area');
        container.innerHTML = '<h3>Manage History</h3><button class="btn btn-del" style="width:100%; margin-bottom:10px; background:#ff4444;" onclick="clearRecents()">Clear History</button><div id="recents-list"></div>';
        const list = document.getElementById('recents-list');
        let count = 0;

        window.COURSE_DATA.forEach(sub => {
            if(!sub.weeks) return;
            sub.weeks.forEach(wk => {
                if(wk.isRecent) {
                    list.appendChild(createRecRow(`WEEK: ${sub.code} - ${wk.title}`, () => { wk.isRecent = false; renderRecentsManager(); }));
                    count++;
                }
                if(wk.resources) {
                    Object.entries(wk.resources).forEach(([key, r]) => {
                        if(r.isRecent) {
                            list.appendChild(createRecRow(`RES: ${sub.code} - ${wk.title} - ${key}`, () => { r.isRecent = false; renderRecentsManager(); }));
                            count++;
                        }
                    });
                }
            });
        });
        if(count === 0) list.innerHTML += '<div style="text-align:center; color:#666; margin-top:20px;">No history items.</div>';
    }

    function createRecRow(txt, fn) {
        const div = document.createElement('div'); div.className='recent-manager-item'; 
        div.innerHTML = `<span>${txt}</span><button class="btn btn-del" onclick="(${fn})()">Remove</button>`;
        return div;
    }
    
    function clearRecents() { 
        if(confirm("Clear all history?")) {
            window.COURSE_DATA.forEach(s => s.weeks.forEach(w => { w.isRecent=false; Object.values(w.resources).forEach(r => r.isRecent=false); })); 
            renderRecentsManager();
        }
    }

    function addConfigType() { window.CONFIG.resources.push({name:"New", icon:"📦", defaultDesc:""}); renderConfigEditor(); }
    function delConfigType(i) { if(confirm("Del?")) { window.CONFIG.resources.splice(i,1); renderConfigEditor(); } }
    function updateConfigName(i, name) { window.CONFIG.resources[i].name = name; }

    function bulkWeek(f, v) { window.COURSE_DATA[cIdx].weeks.forEach(w => w[f] = v); renderWeeks(); renderEditor(); }
    function bulkRes(f, v) { const res = window.COURSE_DATA[cIdx].weeks[wIdx].resources; window.CONFIG.resources.forEach(c => { if(res[c.name]) res[c.name][f] = v; }); renderEditor(); }

    function addSubject() { window.COURSE_DATA.push({code:"NEW", name:"New", credits:"3 Credits", semester:"Spring 2026", color: "#e91e8c", weeks:[]}); cIdx = window.COURSE_DATA.length-1; renderSubjects(); renderEditor(); }
    function delSubject(e, i) { e.stopPropagation(); if(confirm("Del?")) { window.COURSE_DATA.splice(i,1); cIdx=0; renderSubjects(); renderEditor(); } }
    function addWeek() { window.COURSE_DATA[cIdx].weeks.push({title:`WEEK ${window.COURSE_DATA[cIdx].weeks.length+1}`, resources:{}}); wIdx=window.COURSE_DATA[cIdx].weeks.length-1; renderWeeks(); renderEditor(); }
    function delWeek(e, i) { e.stopPropagation(); if(confirm("Del?")) { window.COURSE_DATA[cIdx].weeks.splice(i,1); wIdx=0; renderWeeks(); renderEditor(); } }

    window.saveData = () => {
        let content = "window.CONFIG = " + JSON.stringify(window.CONFIG, null, 4) + ";\n\n";
        content += "window.COURSE_DATA = " + JSON.stringify(window.COURSE_DATA, null, 4) + ";\n\n";
        // Export Schedule Data
        content += "window.SCHEDULE_DATA = " + JSON.stringify(window.SCHEDULE_DATA, null, 4) + ";";
        const blob = new Blob([content], {type: "text/javascript"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "course_data.js"; a.click();
    };

    function autoExpireBadges() {
        const DAYS_LIMIT = 7;
        const now = new Date();
        let count = 0;

        function pDate(str) {
            if(!str) return null;
            try {
                const parts = str.trim().split(/\s+/);
                if(parts.length < 2) return null;
                const dParts = parts[0].split('/');
                const tParts = parts[1].split(':');
                const ampm = parts[2] ? parts[2].toUpperCase() : '';
                let h = parseInt(tParts[0], 10);
                const m = parseInt(tParts[1], 10);
                if(ampm === 'PM' && h < 12) h += 12;
                if(ampm === 'AM' && h === 12) h = 0;
                return new Date(dParts[2], dParts[1]-1, dParts[0], h, m);
            } catch(e) { return null; }
        }

        window.COURSE_DATA.forEach(sub => {
            if(!sub.weeks) return;
            sub.weeks.forEach(wk => {
                if(wk.isNew && wk.recentDate) {
                    const date = pDate(wk.recentDate);
                    if(date) {
                        const diffTime = Math.abs(now - date);
                        const diffDays = diffTime / (1000 * 60 * 60 * 24); 
                        if(diffDays > DAYS_LIMIT) {
                            wk.isNew = false;
                            count++;
                        }
                    }
                }
                if(wk.resources) {
                    Object.values(wk.resources).forEach(res => {
                        if(res.isNew && res.recentDate) {
                            const rDate = pDate(res.recentDate);
                            if(rDate) {
                                const rDiff = Math.abs(now - rDate);
                                const rDays = rDiff / (1000 * 60 * 60 * 24);
                                if(rDays > DAYS_LIMIT) {
                                    res.isNew = false;
                                    count++;
                                }
                            }
                        }
                    });
                }
            });
        });
        
        if(viewMode === 'editor') { renderWeeks(); renderEditor(); }
        alert(`Expired ${count} "New" badges older than ${DAYS_LIMIT} days.`);
    }

    init();
</script>
</body>
</html>
