<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Admin Dashboard</title>
    <style>
        :root { --bg: #0a0012; --panel: #1a0d2e; --accent: #e91e8c; --text: #fff; --hover: rgba(233,30,140,0.1); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        .sidebar { width: 300px; background: #130822; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .middle { width: 350px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 20px; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; }
        
        .panel-header { padding: 15px; background: #240b3b; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        .list-container { flex: 1; overflow-y: auto; }
        .list-item { padding: 10px; border-bottom: 1px solid #2a1b3d; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background 0.2s; }
        .list-item:hover { background: var(--hover); }
        .list-item.active { background: var(--accent); color: white; font-weight: bold; border-left: 5px solid white; }
        .list-item.dragging { opacity: 0.5; background: #444; }
        .drag-handle { cursor: grab; color: #666; font-size: 1.2rem; padding:0 5px; }
        
        .btn { border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; color: white; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn-add { background: #4a90e2; width: 100%; padding: 12px; margin-top: auto; border-radius: 0; }
        .btn-del { background: #e91e8c; font-size: 0.8rem; padding: 2px 6px; margin-left: auto; border-radius: 4px; }
        .btn-save { background: #00c853; padding: 15px 40px; font-size: 1.2rem; position: fixed; bottom: 30px; right: 30px; box-shadow: 0 0 20px rgba(0,200,83,0.4); z-index: 1000; border-radius: 50px; }
        .btn-config { width: 100%; background: #333; padding: 15px; text-align: left; font-weight: bold; border-bottom: 1px solid #444; color: #ccc; cursor: pointer; }
        .btn-recents { width: 100%; background: #4a90e2; padding: 15px; text-align: left; font-weight: bold; border-bottom: 1px solid #444; color: white; cursor: pointer; }
        .btn-schedule { width: 100%; background: #ff9500; padding: 15px; text-align: left; font-weight: bold; border-bottom: 1px solid #444; color: black; cursor: pointer; }
        .btn-midterms { width: 100%; background: #007aff; padding: 15px; text-align: left; font-weight: bold; border-bottom: 1px solid #444; color: white; cursor: pointer; }
        .btn-deadlines { width: 100%; background: #00E5FF; padding: 15px; text-align: left; font-weight: bold; border-bottom: 1px solid #444; color: black; cursor: pointer; }
        .btn-expire { width: 100%; background: #673ab7; padding: 15px; text-align: left; font-weight: bold; border-bottom: 1px solid #444; color: white; cursor: pointer; }
        .btn-move { background: transparent; color: #aaa; font-size: 0.8rem; padding: 2px 5px; border: 1px solid #444; border-radius: 3px; }
        .btn-move:hover { background: #444; color: white; }
        
        .bulk-toolbar { padding: 8px; background: #240b3b; display: flex; gap: 5px; flex-wrap: wrap; border-bottom: 1px solid #444; }
        .btn-bulk { background: #444; font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; color: #ddd; border: none; cursor: pointer; flex: 1; text-align: center; }
        
        .form-section { background: #24123b; padding: 20px; border-radius: 12px; border: 1px solid #444; margin-bottom: 20px; }
        h3 { margin-top: 0; color: var(--accent); border-bottom: 1px solid #444; padding-bottom: 10px; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9rem; font-weight:bold; }
        input[type="text"], textarea, select, input[type="number"] { width: 100%; padding: 8px; background: #0a0012; border: 1px solid #444; color: white; border-radius: 4px; margin-bottom: 10px; font-family: inherit; }
        input[type="color"] { width: 100%; height: 40px; padding: 0; border: 2px solid #555; background: none; cursor: pointer; border-radius: 4px; }
        input[type="text"]:focus, textarea:focus, select:focus, input[type="number"]:focus { border-color: var(--accent); outline: none; }
        
        .checkbox-row { display: flex; gap: 15px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .checkbox-label { display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; font-size: 0.9rem; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 4px; }
        input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
        
        .res-item { display: flex; gap: 10px; padding: 15px; background: #150a25; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; align-items: flex-start; }
        .res-content { flex: 1; }
        .res-header { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; flex-wrap: wrap; gap: 10px; }
        .badge-new { background: var(--accent); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .btn-time { background: #333; border: 1px solid #555; padding: 2px 8px; margin-left: 5px; font-size: 0.8rem; cursor: pointer; color: white; border-radius: 4px; }
        
        .recent-manager-item { display: flex; justify-content: space-between; align-items: center; background: #150a25; padding: 10px; margin-bottom: 5px; border-bottom: 1px solid #333; font-size: 0.9rem; }
        
        .view-select { width: 100%; background: #0a0012; color: white; border: 1px solid var(--accent-pink); padding: 10px; font-size: 1rem; font-weight: bold; font-family: 'Orbitron'; border-radius: 8px; outline: none; cursor: pointer; text-transform: uppercase; }
        .view-select option { background: #0a0012; color: white; font-family: 'Segoe UI'; font-weight: normal; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0012; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div onclick="toggleConfig()" class="btn-config">⚙️ CONFIG</div>
    <div onclick="toggleRecents()" class="btn-recents">📜 MANAGE HISTORY</div>
    <div onclick="toggleSchedule()" class="btn-schedule">📅 MANAGE SCHEDULE</div>
    <div onclick="toggleMidterms()" class="btn-midterms">📝 MANAGE MIDTERMS</div>
    <div onclick="autoExpireBadges()" class="btn-expire">⏳ AUTO-EXPIRE NEW</div>
    
    <div class="panel-header">SUBJECTS</div>
    <div id="subject-list" class="list-container"></div>
    <button class="btn btn-add" onclick="addSubject()">+ Add Subject</button>
</div>

<div class="middle" id="middle-col">
    </div>

<div class="main">
    <div id="editor-area" style="max-width: 900px; margin: 0 auto; width: 100%;">
        <div style="text-align:center; color:#666; margin-top:50px;">Select a subject and list item.</div>
    </div>
</div>

<button class="btn btn-save" onclick="saveData()">💾 SAVE & DOWNLOAD</button>

<script src="course_data.js"></script>
<script>
    let cIdx = 0; let wIdx = 0; let eIdx = 0; let pIdx = 0; let schWIdx = 0; 
    let dragSrcIndex = null; 
    let viewMode = 'editor'; 
    let subViewMode = 'weeks'; 

    function getSubjectColorFallback(code) {
        const colors = { 'CA': '#ff9500', 'DSA': '#34c759', 'DB': '#007aff', 'OS': '#ff2d55', 'CN': '#af52de', 'AI': '#B388FF' };
        return colors[code] || '#e91e8c';
    }

    function getSubjectColor(code) { 
        if(window.COURSE_DATA) {
            const s = window.COURSE_DATA.find(x => x.code === code);
            if(s && s.color) return s.color;
        }
        return getSubjectColorFallback(code);
    }

    function pDate(str) {
        if(!str) return null;
        try {
            const parts = str.trim().split(/\s+/); if(parts.length < 2) return null;
            const dParts = parts[0].split('/'); const tParts = parts[1].split(':'); const ampm = parts[2] ? parts[2].toUpperCase() : '';
            let h = parseInt(tParts[0], 10); const m = parseInt(tParts[1], 10);
            if(ampm === 'PM' && h < 12) h += 12; if(ampm === 'AM' && h === 12) h = 0;
            return new Date(dParts[2], dParts[1]-1, dParts[0], h, m);
        } catch(e) { return null; }
    }

    function init() {
        if(typeof window.COURSE_DATA === 'undefined') window.COURSE_DATA = [];
        if(typeof window.CONFIG === 'undefined') window.CONFIG = { resources: [], taskPresets: [] };
        
        if(!window.CONFIG.taskPresets || window.CONFIG.taskPresets.length === 0) {
            window.CONFIG.taskPresets = [
                { name: "Quiz", icon: "🧠" }, { name: "Assignment", icon: "📝" }, { name: "Mini Project", icon: "🚀" },
                { name: "Report", icon: "📊" }, { name: "Lab Exam", icon: "🧪" }, { name: "Midterm", icon: "🎓" }, { name: "Final", icon: "🏁" }
            ];
        }

        if(typeof window.MIDTERM_DATA === 'undefined') {
            window.MIDTERM_DATA = [
                { dateLabel: 'Friday · 27 March', sub: 'DSA', examCode: 'CSE-XXX', time: '2:30 PM', note: '', coverage: '', where: '', whereLink: '' }
            ];
        }
        if(typeof window.SCHEDULE_DATA === 'undefined') {
            window.SCHEDULE_DATA = [{ week: 1, tasks: [] }];
        }

        if(!window.CONFIG.resources || window.CONFIG.resources.length === 0) {
            window.CONFIG.resources = [ { name: "Lecture", icon: "▶️", defaultDesc: "" }, { name: "Notes", icon: "💡", defaultDesc: "" }, { name: "Lab", icon: "🧪", defaultDesc: "" } ];
        }

        window.COURSE_DATA.forEach(sub => {
            if(!sub.weeks) sub.weeks = [];
            if(!sub.events) sub.events = [];
            if(!sub.playlists) sub.playlists = [];
            
            const lists = [sub.weeks, sub.events];
            lists.forEach(list => {
                list.forEach(item => {
                    if(!item.resources) item.resources = {};
                    window.CONFIG.resources.forEach(conf => {
                        if(!item.resources[conf.name]) { 
                            item.resources[conf.name] = { vis:false, link:"#", desc:conf.defaultDesc, isNew:false, isRecent:false, recentDate:"" }; 
                        }
                    });
                });
            });
        });

        renderSubjects();
        renderEditor();
    }

    function toggleConfig() { setView('config'); renderConfigEditor(); }
    function toggleRecents() { setView('recents'); renderRecentsManager(); }
    function toggleSchedule() { setView('schedule'); renderScheduleWeeks(); renderScheduleEditor(); }
    function toggleMidterms() { setView('midterms'); renderMidtermsManager(); }
    function exitView() { setView('editor'); renderSubjects(); renderMiddleColumn(); renderEditor(); }

    function setView(mode) {
        viewMode = mode;
        const mid = document.getElementById('middle-col');
        if(mode === 'editor' || mode === 'schedule') {
            mid.style.display = 'flex';
        } else {
            mid.style.display = 'none';
        }
    }

    // --- NORMAL EDITOR (SUBJECTS & TABS) ---
    function renderSubjects() {
        const list = document.getElementById('subject-list');
        list.innerHTML = '';
        window.COURSE_DATA.forEach((sub, i) => {
            const el = document.createElement('div');
            el.className = `list-item ${i === cIdx && viewMode==='editor' ? 'active' : ''}`;
            el.draggable = true;
            el.addEventListener('dragstart', (e) => handleDragStart(e, i, 'sub'));
            el.addEventListener('dragover', handleDragOver);
            el.addEventListener('drop', (e) => handleDrop(e, i, 'sub'));
            
            el.innerHTML = `
                <span class="drag-handle">☰</span>
                <div style="flex:1">${sub.code || 'New'}</div>
                <button class="btn-move" onclick="moveItem(event, 'sub', ${i}, -1)">▲</button>
                <button class="btn-move" onclick="moveItem(event, 'sub', ${i}, 1)">▼</button>
                <button class="btn btn-del" onclick="delSubject(event, ${i})">✕</button>
            `;
            el.onclick = (e) => { if(e.target.tagName !== 'BUTTON') { cIdx = i; wIdx = 0; eIdx = 0; pIdx = 0; exitView(); } };
            list.appendChild(el);
        });
        if(window.COURSE_DATA.length > 0 && viewMode === 'editor') renderMiddleColumn();
    }

    function renderMiddleColumn() {
        const mid = document.getElementById('middle-col');
        const sub = window.COURSE_DATA[cIdx];
        if(!sub) return;

        let bulkToolbar = '';

        if (subViewMode === 'weeks' || subViewMode === 'events') {
            bulkToolbar = `
                <div class="bulk-toolbar">
                    <button class="btn-bulk" onclick="bulkResGlobal('vis', true)">Show All Res</button>
                    <button class="btn-bulk" onclick="bulkResGlobal('vis', false)">Hide All Res</button>
                </div>
            `;
        }

        mid.innerHTML = `
            <div class="panel-header" style="padding:10px;">
                <select class="view-select" onchange="subViewMode=this.value; wIdx=0; eIdx=0; pIdx=0; renderMiddleColumn(); renderEditor();">
                    <option value="weeks" ${subViewMode==='weeks'?'selected':''}>📚 WEEKS</option>
                    <option value="events" ${subViewMode==='events'?'selected':''}>🎯 EXAM MATERIALS</option>
                    <option value="playlists" ${subViewMode==='playlists'?'selected':''}>🔗 USEFUL LINKS</option>
                </select>
            </div>
            ${bulkToolbar}
            <div id="middle-list-container" class="list-container"></div>
            <div id="middle-btn-container"></div>
        `;

        const listContainer = document.getElementById('middle-list-container');
        const btnContainer = document.getElementById('middle-btn-container');

        if (subViewMode === 'weeks') {
            sub.weeks.forEach((wk, i) => {
                const el = document.createElement('div');
                el.className = `list-item ${i === wIdx ? 'active' : ''}`;
                el.draggable = true;
                el.addEventListener('dragstart', (e) => handleDragStart(e, i, 'week'));
                el.addEventListener('dragover', handleDragOver);
                el.addEventListener('drop', (e) => handleDrop(e, i, 'week'));
                el.innerHTML = `<span class="drag-handle">☰</span><div style="flex:1">${wk.title} ${wk.isNew ? '★' : ''}</div><button class="btn-move" onclick="moveItem(event, 'week', ${i}, -1)">▲</button><button class="btn-move" onclick="moveItem(event, 'week', ${i}, 1)">▼</button><button class="btn btn-del" onclick="delMiddleItem(event, 'week', ${i})">✕</button>`;
                el.onclick = (e) => { if(e.target.tagName !== 'BUTTON') { wIdx = i; renderMiddleColumn(); renderEditor(); } };
                listContainer.appendChild(el);
            });
            btnContainer.innerHTML = `<button class="btn btn-add" onclick="addMiddleItem('week')">+ Add Week</button>`;
        } 
        else if (subViewMode === 'events') {
            sub.events.forEach((ev, i) => {
                const el = document.createElement('div');
                el.className = `list-item ${i === eIdx ? 'active' : ''}`;
                el.draggable = true;
                el.addEventListener('dragstart', (e) => handleDragStart(e, i, 'event'));
                el.addEventListener('dragover', handleDragOver);
                el.addEventListener('drop', (e) => handleDrop(e, i, 'event'));
                el.innerHTML = `<span class="drag-handle">☰</span><div style="flex:1">${ev.title} ${ev.isNew ? '★' : ''}</div><button class="btn-move" onclick="moveItem(event, 'event', ${i}, -1)">▲</button><button class="btn-move" onclick="moveItem(event, 'event', ${i}, 1)">▼</button><button class="btn btn-del" onclick="delMiddleItem(event, 'event', ${i})">✕</button>`;
                el.onclick = (e) => { if(e.target.tagName !== 'BUTTON') { eIdx = i; renderMiddleColumn(); renderEditor(); } };
                listContainer.appendChild(el);
            });
            btnContainer.innerHTML = `<button class="btn btn-add" onclick="addMiddleItem('event')">+ Add Event Material</button>`;
        }
        else if (subViewMode === 'playlists') {
            sub.playlists.forEach((pl, i) => {
                const el = document.createElement('div');
                el.className = `list-item ${i === pIdx ? 'active' : ''}`;
                el.draggable = true;
                el.addEventListener('dragstart', (e) => handleDragStart(e, i, 'playlist'));
                el.addEventListener('dragover', handleDragOver);
                el.addEventListener('drop', (e) => handleDrop(e, i, 'playlist'));
                el.innerHTML = `<span class="drag-handle">☰</span><div style="flex:1">${pl.title || 'Link'}</div><button class="btn-move" onclick="moveItem(event, 'playlist', ${i}, -1)">▲</button><button class="btn-move" onclick="moveItem(event, 'playlist', ${i}, 1)">▼</button><button class="btn btn-del" onclick="delMiddleItem(event, 'playlist', ${i})">✕</button>`;
                el.onclick = (e) => { if(e.target.tagName !== 'BUTTON') { pIdx = i; renderMiddleColumn(); renderEditor(); } };
                listContainer.appendChild(el);
            });
            btnContainer.innerHTML = `<button class="btn btn-add" onclick="addMiddleItem('playlist')">+ Add Useful Link</button>`;
        }
    }

    function addMiddleItem(type) {
        if(type === 'week') { window.COURSE_DATA[cIdx].weeks.push({title:`WEEK ${window.COURSE_DATA[cIdx].weeks.length+1}`, resources:{}}); wIdx=window.COURSE_DATA[cIdx].weeks.length-1; }
        else if(type === 'event') { window.COURSE_DATA[cIdx].events.push({title:`Quiz ${window.COURSE_DATA[cIdx].events.length+1}`, resources:{}}); eIdx=window.COURSE_DATA[cIdx].events.length-1; }
        else if(type === 'playlist') { window.COURSE_DATA[cIdx].playlists.push({title:`New Link`, link:"#", icon:"🔗", note:"", badgeText:"", badgeColor:"#e91e8c"}); pIdx=window.COURSE_DATA[cIdx].playlists.length-1; }
        renderMiddleColumn(); renderEditor();
    }
    
    function delMiddleItem(e, type, i) {
        e.stopPropagation();
        if(confirm("Delete this item?")) {
            if(type === 'week') { window.COURSE_DATA[cIdx].weeks.splice(i,1); wIdx=0; }
            else if(type === 'event') { window.COURSE_DATA[cIdx].events.splice(i,1); eIdx=0; }
            else if(type === 'playlist') { window.COURSE_DATA[cIdx].playlists.splice(i,1); pIdx=0; }
            renderMiddleColumn(); renderEditor();
        }
    }

    function renderEditor() {
        if(viewMode !== 'editor') return;
        const container = document.getElementById('editor-area');
        if(!window.COURSE_DATA[cIdx]) { container.innerHTML = ''; return; }
        const sub = window.COURSE_DATA[cIdx];
        
        let html = `
            <div class="form-section">
                <h3>Subject Details</h3>
                <div style="display:grid; grid-template-columns: 1fr 3fr; gap:10px;">
                    <div><label>Code</label><input type="text" value="${sub.code}" oninput="updateData('sub', 'code', this.value)" onblur="renderSubjects()"></div>
                    <div><label>Name</label><input type="text" value="${sub.name}" oninput="updateData('sub', 'name', this.value)"></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 2fr; gap:10px; margin-top:10px;">
                    <div><label>Credits</label><input type="text" value="${sub.credits}" oninput="updateData('sub', 'credits', this.value)"></div>
                    <div><label>Semester</label><input type="text" value="${sub.semester}" oninput="updateData('sub', 'semester', this.value)"></div>
                    <div><label>Color</label><input type="color" value="${sub.color || getSubjectColorFallback(sub.code)}" oninput="updateData('sub', 'color', this.value)"></div>
                    <div><label>Drive Link</label><input type="text" placeholder="https://drive..." value="${sub.driveLink || ''}" oninput="updateData('sub', 'driveLink', this.value)"></div>
                </div>
            </div>`;

        if (subViewMode === 'weeks' || subViewMode === 'events') {
            const isEvent = subViewMode === 'events';
            const item = isEvent ? sub.events[eIdx] : sub.weeks[wIdx];
            
            if(item) {
                html += `
                <div class="form-section">
                    <h3 style="color:${isEvent ? 'var(--accent-blue)' : 'var(--accent-pink)'}">${isEvent ? 'Event Details' : 'Week Details'}</h3>
                    <label>Title</label><input type="text" value="${item.title}" oninput="updateData('${subViewMode}', 'title', this.value)" onblur="renderMiddleColumn()">
                    
                    <div class="checkbox-row" style="background:#150a25; padding:10px; border-radius:8px;">
                        <label class="checkbox-label"><input type="checkbox" ${item.locked ? 'checked' : ''} onchange="updateData('${subViewMode}', 'locked', this.checked)"> Locked</label>
                        <label class="checkbox-label"><input type="checkbox" ${item.isNew ? 'checked' : ''} onchange="updateData('${subViewMode}', 'isNew', this.checked); renderMiddleColumn()"> New!</label>
                        <div style="display:flex; align-items:center; gap:5px; background:#2a1b3d; padding:2px 8px; border-radius:4px; border:1px solid #444;">
                            <label class="checkbox-label"><input type="checkbox" ${item.isRecent ? 'checked' : ''} onchange="updateData('${subViewMode}', 'isRecent', this.checked)"> <span style="color:#4a90e2">History</span></label>
                            <input type="text" style="width:140px; margin:0; font-size:0.8rem;" placeholder="Date..." value="${item.recentDate || ''}" oninput="updateData('${subViewMode}', 'recentDate', this.value)">
                            <button class="btn-time" onclick="setNowContainer()">🕒</button>
                        </div>
                    </div>

                    <div style="background:#150a25; padding:10px; border-radius:8px; margin-top:10px;">
                        <div class="checkbox-row">
                            <label class="checkbox-label" style="font-weight:bold; color:var(--accent);">Custom Badge (Top Right):</label>
                            <label class="checkbox-label"><input type="checkbox" ${item.showBadge ? 'checked' : ''} onchange="updateData('${subViewMode}', 'showBadge', this.checked)"> Enable</label>
                        </div>
                        <div style="display:grid; grid-template-columns: 3fr 1fr; gap:10px;">
                            <input type="text" placeholder="Text (e.g. Midterm)" value="${item.badgeText || ''}" oninput="updateData('${subViewMode}', 'badgeText', this.value)">
                            <input type="color" value="${item.badgeColor || '#e91e8c'}" oninput="updateData('${subViewMode}', 'badgeColor', this.value)">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #444; padding-bottom:10px; margin-bottom:15px;">
                        <h3 style="border:none; margin:0; padding:0;">Resources</h3>
                    </div>
                    <div id="res-list-container"></div>
                </div>`;
                container.innerHTML = html;
                renderResources(item);
            } else {
                container.innerHTML = html + `<p style="text-align:center;">No ${subViewMode} found.</p>`;
            }
        } 
        else if (subViewMode === 'playlists') {
            const p = sub.playlists[pIdx];
            if(p) {
                html += `
                <div class="form-section" style="border-color:#4a90e2;">
                    <h3 style="color:#4a90e2;">Link Details</h3>
                    <div style="display:grid; grid-template-columns: 60px 1fr; gap:10px;">
                        <div><label>Icon</label><input type="text" style="text-align:center;" value="${p.icon || '🔗'}" oninput="updateData('playlists', 'icon', this.value); renderMiddleColumn()"></div>
                        <div><label>Title</label><input type="text" value="${p.title || ''}" oninput="updateData('playlists', 'title', this.value); renderMiddleColumn()"></div>
                    </div>
                    <label>Link (URL)</label><input type="text" placeholder="https://..." value="${p.link || ''}" oninput="updateData('playlists', 'link', this.value)">
                    <label>Description / Note</label><textarea rows="2" placeholder="Notes about this link..." oninput="updateData('playlists', 'note', this.value)">${p.note || ''}</textarea>
                    
                    <div style="background:#150a25; padding:10px; border-radius:8px; margin-top:10px;">
                        <label style="font-weight:bold; color:var(--accent);">Custom Badge (Top Right):</label>
                        <div style="display:grid; grid-template-columns: 3fr 1fr; gap:10px; margin-top:5px;">

    function getNowStr() {

        let h = now.getHours(); const am = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
        const m = now.getMinutes().toString().padStart(2, '0'); return `${d} ${h}:${m} ${am}`;
    }

    function moveItem(e, type, idx, dir) {
        e.stopPropagation(); let arr;
        if(type === 'sub') arr = window.COURSE_DATA; 
        else if(type === 'week') arr = window.COURSE_DATA[cIdx].weeks;
        else if(type === 'event') arr = window.COURSE_DATA[cIdx].events;
        else if(type === 'playlist') arr = window.COURSE_DATA[cIdx].playlists;
        if(idx + dir < 0 || idx + dir >= arr.length) return;
        [arr[idx], arr[idx+dir]] = [arr[idx+dir], arr[idx]];
        if(type === 'sub' && cIdx === idx) cIdx += dir; 
        else if(type === 'week' && wIdx === idx) wIdx += dir;
        else if(type === 'event' && eIdx === idx) eIdx += dir;
        else if(type === 'playlist' && pIdx === idx) pIdx += dir;
        if(type==='sub') renderSubjects(); else renderMiddleColumn();
    }

    function handleDragStart(e, idx, type) { dragSrcIndex = idx; e.dataTransfer.setData('type', type); }
    function handleDragOver(e) { e.preventDefault(); }
    function handleDrop(e, dropIndex, type) {
        e.stopPropagation();
        const srcType = e.dataTransfer.getData('type');
        if(srcType !== type || dragSrcIndex === dropIndex) return;
        let arr;
        if(type === 'sub') { arr = window.COURSE_DATA; if(cIdx === dragSrcIndex) cIdx = dropIndex; }
        else if(type === 'week') { arr = window.COURSE_DATA[cIdx].weeks; if(wIdx === dragSrcIndex) wIdx = dropIndex; }
        else if(type === 'event') { arr = window.COURSE_DATA[cIdx].events; if(eIdx === dragSrcIndex) eIdx = dropIndex; }
        else if(type === 'playlist') { arr = window.COURSE_DATA[cIdx].playlists; if(pIdx === dragSrcIndex) pIdx = dropIndex; }
        else if(type === 'config') { arr = window.CONFIG.resources; }
        else if(type === 'configTask') { arr = window.CONFIG.taskPresets; }
        const item = arr.splice(dragSrcIndex, 1)[0];
        arr.splice(dropIndex, 0, item);
        if(type === 'sub') renderSubjects(); 
        else if(['week','event','playlist'].includes(type)) renderMiddleColumn(); 
        else renderConfigEditor();
    }

    function autoExtractDeadline(tIdx) {
        const task = window.SCHEDULE_DATA[schWIdx].tasks[tIdx];
        const whenStr = task.when || '';
        
        // Extract ALL dates in brackets: (25/03) or [25/03]
        const dateMatches = [...whenStr.matchAll(/[\(\[](\d{1,2})[\/ \-](\d{1,2})[\)\]]/g)];
        // Extract ALL times: 10:00 AM, 2:00 PM
        const timeMatches = [...whenStr.matchAll(/(\d{1,2}:\d{2})\s*(AM|PM)/gi)];

        function fmtDate(m) { return m[1].padStart(2,'0') + '/' + m[2].padStart(2,'0') + '/2026'; }
        function fmtTime(m) { return m[1] + ' ' + m[2].toUpperCase(); }

        let startStr = '';
        let endStr = '';

        if (dateMatches.length >= 2 && timeMatches.length >= 2) {
            // Two dates + two times: (23/03) 10:00 AM to (25/03) 2:00 PM
            startStr = fmtDate(dateMatches[0]) + ' ' + fmtTime(timeMatches[0]);
            endStr = fmtDate(dateMatches[1]) + ' ' + fmtTime(timeMatches[1]);
        } else if (dateMatches.length >= 2 && timeMatches.length === 1) {
            // Two dates + one time
            startStr = fmtDate(dateMatches[0]) + ' ' + fmtTime(timeMatches[0]);
            endStr = fmtDate(dateMatches[1]) + ' 11:59 PM';
        } else if (dateMatches.length >= 2 && timeMatches.length === 0) {
            // Two dates, no times
            startStr = fmtDate(dateMatches[0]) + ' 12:00 AM';
            endStr = fmtDate(dateMatches[1]) + ' 11:59 PM';
        } else if (dateMatches.length === 1 && timeMatches.length >= 2) {
            // One date + two times: (25/03) 10:00 AM to 2:00 PM
            const d = fmtDate(dateMatches[0]);
            startStr = d + ' ' + fmtTime(timeMatches[0]);
            endStr = d + ' ' + fmtTime(timeMatches[1]);
        } else if (dateMatches.length === 1 && timeMatches.length === 1) {
            // One date + one time (simple case)
            startStr = fmtDate(dateMatches[0]) + ' ' + fmtTime(timeMatches[0]);
            endStr = '';
        } else if (dateMatches.length === 1 && timeMatches.length === 0) {
            startStr = fmtDate(dateMatches[0]) + ' 11:59 PM';
            endStr = '';
            alert("Found the date, but no time (e.g., 10:00 AM). Defaulted to 11:59 PM.");
        } else if (dateMatches.length === 0 && timeMatches.length >= 1) {
            alert("Found time(s) but no date in brackets like (25/03). Please add a date.");
            return;
        } else {
            alert("Couldn't find a date in brackets like (25/03) or a time like 10:00 AM.");
            return;
        }

        task.deadlineDate = startStr;
        task.deadlineEndDate = endStr;
        renderScheduleEditor();
    }

    function updateDeadlines() {
        let count = 0;
        const now = new Date().getTime();
        window.SCHEDULE_DATA.forEach(wk => {
            if(wk.tasks) {
                wk.tasks.forEach(t => {
                    if(!t.isCompleted && t.deadlineDate && t.deadlineDate.trim() !== '') {
                        const endStr = (t.deadlineEndDate && t.deadlineEndDate.trim() !== '') ? t.deadlineEndDate : t.deadlineDate;
                        const ts = pDate(endStr); 
                        if(ts && now > ts.getTime()) {
                            t.isCompleted = true;
                            count++;
                        }
                    }
                });
            }
        });
        if(viewMode === 'schedule') { renderScheduleEditor(); }
        alert(`Updated and automatically marked ${count} past tasks as completed!`);

                <div class="drag-handle">☰</div>
                <div style="flex:1; display:flex; gap:10px;">
                    <div style="flex:0 0 50px;"><input type="text" value="${tp.icon}" style="text-align:center" onchange="updateConfigTaskPreset(${i}, 'icon', this.value)"></div>
                    <div style="flex:1;"><input type="text" value="${tp.name}" onchange="updateConfigTaskPreset(${i}, 'name', this.value)"></div>
                </div>
                <button class="btn btn-del" onclick="delConfigTaskPreset(${i})">✕</button>
            `;
            taskList.appendChild(el);
        });
    }

    function addConfigTaskPreset() { window.CONFIG.taskPresets.push({ name: "New Preset", icon: "📌" }); renderConfigEditor(); }
    function delConfigTaskPreset(i) { if(confirm("Delete this preset?")) { window.CONFIG.taskPresets.splice(i, 1); renderConfigEditor(); } }
    function updateConfigTaskPreset(i, field, val) { window.CONFIG.taskPresets[i][field] = val; }
    
    function renderRecentsManager() {
        const container = document.getElementById('editor-area');
        container.innerHTML = '<h3>Manage History</h3><button class="btn btn-del" style="width:100%; margin-bottom:10px; background:#ff4444;" onclick="clearRecents()">Clear History</button><div id="recents-list"></div>';
        const list = document.getElementById('recents-list');
        let count = 0;
        window.COURSE_DATA.forEach(sub => {
            const combinedLists = [...(sub.weeks || []), ...(sub.events || [])];
            combinedLists.forEach(wk => {
                if(wk.isRecent) { list.appendChild(createRecRow(`${sub.code} - ${wk.title}`, () => { wk.isRecent = false; renderRecentsManager(); })); count++; }
                if(wk.resources) { Object.entries(wk.resources).forEach(([key, r]) => { if(r.isRecent) { list.appendChild(createRecRow(`RES: ${sub.code} - ${wk.title} - ${key}`, () => { r.isRecent = false; renderRecentsManager(); })); count++; } }); }
            });
        });
        if(count === 0) list.innerHTML += '<div style="text-align:center; color:#666; margin-top:20px;">No history items.</div>';
    }

    function createRecRow(txt, fn) { const div = document.createElement('div'); div.className='recent-manager-item'; div.innerHTML = `<span>${txt}</span><button class="btn btn-del" onclick="(${fn})()">Remove</button>`; return div; }
    function clearRecents() { if(confirm("Clear all history?")) { window.COURSE_DATA.forEach(s => { [s.weeks, s.events].forEach(list => { if(list) list.forEach(w => { w.isRecent=false; Object.values(w.resources).forEach(r => r.isRecent=false); }); }); }); renderRecentsManager(); } }
    
    function addConfigType() { window.CONFIG.resources.push({name:"New", icon:"📦", defaultDesc:""}); renderConfigEditor(); }
    function delConfigType(i) { if(confirm("Del?")) { window.CONFIG.resources.splice(i,1); renderConfigEditor(); } }
    function updateConfigName(i, name) { window.CONFIG.resources[i].name = name; }
    
    function addSubject() { window.COURSE_DATA.push({code:"NEW", name:"New", credits:"3 Credits", semester:"Spring 2026", color: "#e91e8c", weeks:[], events:[], playlists:[]}); cIdx = window.COURSE_DATA.length-1; renderSubjects(); renderEditor(); }
    function delSubject(e, i) { e.stopPropagation(); if(confirm("Del?")) { window.COURSE_DATA.splice(i,1); cIdx=0; renderSubjects(); renderEditor(); } }

    window.saveData = () => {
        let content = "window.CONFIG = " + JSON.stringify(window.CONFIG, null, 4) + ";\n\n";
        content += "window.COURSE_DATA = " + JSON.stringify(window.COURSE_DATA, null, 4) + ";\n\n";
        content += "window.SCHEDULE_DATA = " + JSON.stringify(window.SCHEDULE_DATA, null, 4) + ";\n\n";
        content += "window.MIDTERM_DATA = " + JSON.stringify(window.MIDTERM_DATA, null, 4) + ";";
        const blob = new Blob([content], {type: "text/javascript"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "course_data.js"; a.click();
    };

    function autoExpireBadges() {
        const DAYS_LIMIT = 7;
        const now = new Date(); let count = 0;
        
        window.COURSE_DATA.forEach(sub => {
            const combinedLists = [...(sub.weeks || []), ...(sub.events || [])];
            combinedLists.forEach(wk => {
                if(wk.isNew && wk.recentDate) { const date = pDate(wk.recentDate); if(date) { const diffDays = Math.abs(now - date) / (1000 * 60 * 60 * 24); if(diffDays > DAYS_LIMIT) { wk.isNew = false; count++; } } }
                if(wk.resources) { Object.values(wk.resources).forEach(res => { if(res.isNew && res.recentDate) { const rDate = pDate(res.recentDate); if(rDate) { const rDays = Math.abs(now - rDate) / (1000 * 60 * 60 * 24); if(rDays > DAYS_LIMIT) { res.isNew = false; count++; } } } }); }
            });
        });
        if(viewMode === 'editor') { renderMiddleColumn(); renderEditor(); }
        alert(`Expired ${count} "New" badges older than ${DAYS_LIMIT} days.`);
    }

    init();
</script>
</body>
</html>
